<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>럭키스타 캠핑카라반 - 관리 시스템</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root{--navy:#0f1923;--navy2:#1a2637;--blue:#1e6fd9;--gold:#f0a500;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--bg:#f4f6fa;--red:#ef4444;--green:#22c55e;--purple:#7c3aed;--orange:#f97316;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
#root{display:flex;width:100%;min-height:100vh;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border:none;border-radius:8px;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--blue);color:#fff;}.btn-primary:hover{background:#1558b0;}
.btn-gold{background:var(--gold);color:var(--navy);}.btn-gold:hover{background:#d4900a;}
.btn-outline{background:#fff;color:var(--text);border:1.5px solid var(--border);}.btn-outline:hover{border-color:var(--blue);color:var(--blue);}
.btn-green{background:var(--green);color:#fff;}.btn-green:hover{background:#16a34a;}
.btn-red{background:var(--red);color:#fff;}.btn-red:hover{background:#dc2626;}
.btn-sm{padding:6px 12px;font-size:12px;}.btn-xs{padding:4px 8px;font-size:11px;}
.btn-icon{background:none;border:none;cursor:pointer;font-size:15px;padding:3px 5px;line-height:1;transition:opacity .15s;}.btn-icon:hover{opacity:.6;}
.card{background:#fff;border-radius:12px;border:1.5px solid var(--border);padding:22px 26px;margin-bottom:22px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.card-title{font-size:11px;font-weight:700;color:var(--blue);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.card-title::after{content:'';flex:1;height:1px;background:var(--border);}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:26px;gap:16px;flex-wrap:wrap;}
.page-title-wrap h1{font-size:24px;font-weight:900;color:var(--navy);}
.page-title-wrap p{font-size:12px;color:var(--muted);margin-top:3px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-blue{background:#dbeafe;color:var(--blue);}
.badge-green{background:#dcfce7;color:#16a34a;}
.badge-gray{background:var(--bg);color:var(--muted);}
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;height:100vh;gap:16px;}
.loading-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:9999;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(16px);opacity:0;}to{transform:none;opacity:1;}}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;text-align:center;}
.empty-icon{font-size:40px;opacity:.35;}.empty-text{font-size:14px;color:var(--muted);}

/* 로그인 */
.login-wrap{display:flex;width:100%;min-height:100vh;}
.login-left{flex:1;background:linear-gradient(135deg,#0f1923,#1a3050);display:flex;flex-direction:column;justify-content:center;padding:60px;}
.login-logo{font-family:'Bebas Neue',sans-serif;font-size:48px;color:#fff;letter-spacing:3px;line-height:1;margin-bottom:8px;}
.login-logo span{color:var(--gold);}
.login-tagline{font-size:13px;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;margin-bottom:48px;}
.lf-item{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.lf-icon{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.lf-text strong{display:block;font-size:13px;color:#fff;font-weight:700;}
.lf-text span{font-size:11px;color:rgba(255,255,255,.4);}
.login-right{width:460px;background:#fff;display:flex;flex-direction:column;justify-content:center;padding:60px 50px;flex-shrink:0;}
.login-title{font-size:24px;font-weight:900;color:var(--navy);margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:36px;line-height:1.7;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.field input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s,background .15s;}
.field input:focus{border-color:var(--blue);background:#f0f6ff;}
.setup-block{background:var(--bg);border-radius:12px;padding:20px;margin-bottom:24px;}
.setup-block-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;}
/* ── 인앱브라우저 경고 ── */
.inapp-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:env(safe-area-inset-top,30px) 24px 30px;background:linear-gradient(135deg,#0f1923,#1a3050);text-align:center;gap:20px;}
.inapp-icon{font-size:64px;}
.inapp-title{font-size:22px;font-weight:900;color:#fff;line-height:1.3;}
.inapp-desc{font-size:14px;color:rgba(255,255,255,.65);line-height:1.8;max-width:320px;}
.inapp-url{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:10px;padding:12px 16px;font-size:13px;color:#fff;word-break:break-all;margin:0 auto;max-width:320px;}
.inapp-btn{background:var(--gold);color:var(--navy);border:none;border-radius:10px;padding:14px 28px;font-size:15px;font-weight:900;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:background .15s;}
.inapp-btn:hover{background:#d4900a;}
.inapp-steps{background:rgba(255,255,255,.07);border-radius:12px;padding:16px 20px;max-width:320px;text-align:left;}
.inapp-step{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;font-size:13px;color:rgba(255,255,255,.8);}
.inapp-step:last-child{margin-bottom:0;}
.inapp-step-num{background:var(--gold);color:var(--navy);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;margin-top:1px;}

.btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:12px;background:#fff;border:2px solid var(--border);border-radius:10px;padding:14px 20px;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:var(--text);cursor:pointer;transition:all .15s;}
.btn-google:hover{border-color:var(--blue);background:#f0f6ff;color:var(--blue);}
.btn-google:disabled{opacity:.5;cursor:not-allowed;}
.login-divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.login-divider span{font-size:11px;color:var(--muted);}
.login-notice{font-size:11px;color:var(--muted);text-align:center;line-height:1.8;}

/* 사이드바 */
.sidebar{width:240px;background:var(--navy);position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100;}
.sb-header{padding:22px 20px 16px;border-bottom:1px solid rgba(255,255,255,.07);}
.sb-logo{font-family:'Bebas Neue',sans-serif;font-size:20px;color:#fff;letter-spacing:2px;}
.sb-logo span{color:var(--gold);}
.sb-sub{font-size:10px;color:rgba(255,255,255,.28);letter-spacing:1px;margin-top:2px;}
.sb-user{display:flex;align-items:center;gap:10px;padding:12px 20px;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;}
.sb-avatar img{width:100%;height:100%;object-fit:cover;}
.sb-username{font-size:12px;font-weight:600;color:rgba(255,255,255,.75);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-logout{background:none;border:none;color:rgba(255,255,255,.28);cursor:pointer;font-size:18px;transition:color .15s;padding:4px;flex-shrink:0;line-height:1;}
.sb-logout:hover{color:var(--red);}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0;}
.sb-nav::-webkit-scrollbar{width:3px;}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);}
.nav-row{display:flex;align-items:center;border-left:3px solid transparent;transition:all .15s;}
.nav-row:hover{background:rgba(255,255,255,.04);}
.nav-row.active{background:rgba(255,255,255,.07);border-left-color:var(--gold);}
.nav-label{display:flex;align-items:center;gap:10px;flex:1;padding:10px 0 10px 20px;cursor:pointer;font-size:13px;font-weight:600;color:rgba(255,255,255,.5);user-select:none;transition:color .15s;}
.nav-row:hover .nav-label,.nav-row.active .nav-label{color:rgba(255,255,255,.9);}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
.nav-arrow{font-size:9px;transition:transform .2s;margin-left:4px;}
.nav-row.open .nav-arrow{transform:rotate(90deg);}
.nav-plus{background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-size:16px;padding:10px 14px 10px 4px;line-height:1;transition:color .15s;flex-shrink:0;}
.nav-plus:hover{color:var(--gold);}
.nav-sub{overflow:hidden;max-height:0;transition:max-height .3s ease;}
.nav-sub.open{max-height:800px;}
.nav-sub-item{display:flex;align-items:center;gap:8px;padding:7px 12px 7px 50px;cursor:pointer;font-size:12px;color:rgba(255,255,255,.38);transition:color .15s;}
.nav-sub-item:hover{color:rgba(255,255,255,.72);}
.nav-sub-item.active{color:var(--gold);font-weight:700;}
.nav-sub-dot{width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0;}
.nav-sub-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nav-sub-del{background:none;border:none;color:transparent;cursor:pointer;font-size:11px;padding:0 4px;line-height:1;flex-shrink:0;}
.nav-sub-item:hover .nav-sub-del{color:rgba(255,255,255,.3);}
.nav-sub-del:hover{color:var(--red) !important;}

/* ★ 3단계 서브그룹 */
.nav-grp-hd{display:flex;align-items:center;gap:6px;padding:8px 12px 8px 36px;cursor:pointer;font-size:11px;font-weight:700;color:rgba(255,255,255,.5);letter-spacing:.8px;text-transform:uppercase;transition:color .15s;user-select:none;}
.nav-grp-hd:hover{color:rgba(255,255,255,.8);}
.nav-grp-hd.open{color:rgba(255,255,255,.7);}
.nav-grp-arrow{font-size:8px;margin-left:auto;transition:transform .2s;}
.nav-grp-hd.open .nav-grp-arrow{transform:rotate(90deg);}
.nav-sub-sub{overflow:hidden;max-height:0;transition:max-height .28s ease;}
.nav-sub-sub.open{max-height:500px;}
.ssi{display:flex;align-items:center;gap:8px;padding:6px 12px 6px 62px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.32);transition:color .15s;}
.ssi:hover{color:rgba(255,255,255,.68);}
.ssi.active{color:var(--gold);font-weight:700;}
.ssi-dot{width:3px;height:3px;border-radius:50%;background:currentColor;flex-shrink:0;}
.ssi-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ssi-del{background:none;border:none;color:transparent;cursor:pointer;font-size:11px;padding:0 4px;line-height:1;flex-shrink:0;}
.ssi:hover .ssi-del{color:rgba(255,255,255,.25);}
.ssi-del:hover{color:var(--red) !important;}
.ssi-add{display:flex;align-items:center;gap:5px;padding:5px 12px 8px 62px;cursor:pointer;font-size:11px;color:rgba(255,255,255,.25);transition:color .15s;}
.ssi-add:hover{color:var(--gold);}
.sb-footer{padding:14px 20px;border-top:1px solid rgba(255,255,255,.07);}
.sb-total-label{font-size:9px;color:rgba(255,255,255,.28);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px;}
.sb-total-val{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);letter-spacing:1px;}
.sb-status{font-size:10px;color:rgba(255,255,255,.22);margin-top:5px;display:flex;align-items:center;gap:5px;}
.dot-green{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.main{margin-left:240px;flex:1;padding:32px 36px;min-height:100vh;}

/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;}
.modal-box{background:#fff;border-radius:16px;padding:30px;width:640px;max-width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-box.sm{width:420px;}.modal-box.lg{width:880px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.modal-title{font-size:18px;font-weight:800;color:var(--navy);}
.modal-close{background:none;border:none;font-size:22px;color:var(--muted);cursor:pointer;line-height:1;}
.modal-close:hover{color:var(--text);}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.mf{margin-bottom:14px;}.mf.full{grid-column:1/-1;}
.ml{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:block;}
.mi,.ms{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s,background .15s;background:#fff;color:var(--text);}
.mi:focus,.ms:focus{border-color:var(--blue);background:#f0f6ff;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}
.modal-cancel{background:var(--bg);color:var(--muted);border:none;border-radius:8px;padding:10px 20px;font-family:'Noto Sans KR',sans-serif;font-weight:700;cursor:pointer;}
.modal-ok{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:10px 26px;font-family:'Noto Sans KR',sans-serif;font-weight:700;cursor:pointer;}
.img-area{border:2px dashed var(--border);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;}
.img-area:hover{border-color:var(--blue);background:#f0f6ff;}
.img-placeholder{color:var(--muted);font-size:13px;}
.img-placeholder span{font-size:26px;display:block;margin-bottom:4px;}

/* 자재 필요자재 섹션 */
.mat-req-section{background:var(--bg);border-radius:10px;padding:16px;margin-top:16px;}
.mat-req-title{font-size:11px;font-weight:700;color:var(--purple);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.mat-req-title::after{content:'';flex:1;height:1px;background:rgba(124,58,237,.2);}
.mat-add-row{display:grid;grid-template-columns:1fr 1fr 80px auto;gap:8px;align-items:end;margin-bottom:12px;}
.mat-add-btn{background:var(--purple);color:#fff;border:none;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;}
.mat-add-btn:hover{background:#6d28d9;}
.mat-list{border:1.5px solid var(--border);border-radius:8px;overflow:hidden;background:#fff;}
.mat-list-head{display:grid;grid-template-columns:1fr 1fr 80px 90px 36px;background:var(--navy);}
.mat-list-head span{padding:8px 12px;font-size:10px;font-weight:700;color:rgba(255,255,255,.55);letter-spacing:1px;text-transform:uppercase;}
.mat-list-row{display:grid;grid-template-columns:1fr 1fr 80px 90px 36px;border-top:1px solid #f1f5f9;align-items:center;}
.mat-list-row:hover{background:#f8faff;}
.mat-list-row span{padding:8px 12px;font-size:13px;}
.mat-list-del{background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:14px;padding:8px 10px;}
.mat-list-del:hover{color:var(--red);}
.mat-list-empty{padding:20px;text-align:center;color:var(--muted);font-size:12px;}
.mat-total-row{display:flex;justify-content:flex-end;padding:8px 12px;border-top:2px solid var(--border);background:#f8faff;}

/* 필터 탭 */
.cat-filter{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.cat-tab{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.cat-tab:hover{border-color:var(--blue);color:var(--blue);}
.cat-tab.active{background:var(--blue);color:#fff;border-color:var(--blue);}
.cat-tab .cnt{font-size:10px;background:rgba(0,0,0,.08);padding:1px 6px;border-radius:10px;}
.cat-tab.active .cnt{background:rgba(255,255,255,.25);}
.cat-add-tab{padding:7px 14px;border-radius:20px;border:1.5px dashed var(--border);font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;background:transparent;}
.cat-add-tab:hover{border-color:var(--blue);color:var(--blue);}

/* 자재 테이블 */
.table-wrap{background:#fff;border-radius:12px;border:1.5px solid var(--border);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead{background:var(--navy);}
thead th{padding:10px 14px;font-size:10px;font-weight:700;color:rgba(255,255,255,.55);letter-spacing:1px;text-transform:uppercase;white-space:nowrap;}
tbody tr{border-bottom:1px solid #f1f5f9;transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:#f8faff;}
td{padding:9px 14px;vertical-align:middle;}
.tc{text-align:center;}.tr{text-align:right;}
.mat-thumb{width:44px;height:34px;object-fit:cover;border-radius:6px;border:1.5px solid var(--border);}
.mat-thumb-ph{width:44px;height:34px;border:1.5px dashed #cbd5e1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#94a3b8;}
.link-btn{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--blue);text-decoration:none;background:#dbeafe;padding:3px 8px;border-radius:6px;font-weight:600;}
.link-btn:hover{background:var(--blue);color:#fff;}

/* 상품 */
.prod-cat-section{margin-bottom:28px;}
.prod-cat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.prod-cat-name{font-size:17px;font-weight:800;color:var(--navy);display:flex;align-items:center;gap:8px;}
.prod-cat-bar{width:4px;height:20px;background:var(--blue);border-radius:2px;}
.prod-cat-count{font-size:12px;color:var(--muted);background:var(--bg);padding:3px 10px;border-radius:20px;}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
.prod-card{background:#fff;border-radius:12px;border:1.5px solid var(--border);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);transition:all .2s;}
.prod-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.1);transform:translateY(-2px);}
.prod-card-img{width:100%;height:130px;object-fit:cover;background:var(--bg);}
.prod-card-img-ph{width:100%;height:130px;background:linear-gradient(135deg,#f1f5f9,#e2e8f0);display:flex;align-items:center;justify-content:center;font-size:32px;color:#94a3b8;}
.prod-card-body{padding:12px;}
.prod-card-cat{font-size:10px;font-weight:700;color:var(--blue);letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.prod-card-name{font-size:13px;font-weight:800;color:var(--navy);margin-bottom:3px;}
.prod-card-price{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--text);}
.prod-card-mat-count{font-size:10px;color:var(--purple);margin-top:3px;}
.prod-card-desc{font-size:11px;color:var(--muted);margin-top:3px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.prod-card-actions{display:flex;gap:6px;margin-top:8px;}

/* ★ 상태 뱃지 */
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;}
.status-select{border:1.5px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;outline:none;transition:border-color .15s;background:#fff;}
.status-select:focus{border-color:var(--blue);}

/* ★ 견적 목록 테이블 */
.est-list-wrap{background:#fff;border-radius:12px;border:1.5px solid var(--border);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.est-list-wrap table{font-size:13px;}
.est-list-wrap thead th{padding:11px 14px;}
.est-list-wrap tbody td{padding:12px 14px;}
.est-no{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.5px;color:var(--navy);}
.est-client{font-weight:700;color:var(--navy);}
.est-amount{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.5px;}

/* ★ 진행 상태 타임라인 (수정 페이지) */
.status-timeline-card{background:#fff;border-radius:12px;border:1.5px solid var(--border);padding:20px 24px;margin-bottom:22px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.status-timeline-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.status-timeline-title::after{content:'';flex:1;height:1px;background:var(--border);}
.status-row{display:grid;grid-template-columns:36px 1fr auto auto;row-gap:4px;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid #f8faff;}
/* 완료 체크박스 */
.status-check{width:18px;height:18px;cursor:pointer;accent-color:var(--green);flex-shrink:0;}
.status-check-done .status-row-icon{background:var(--green)!important;box-shadow:0 2px 8px rgba(34,197,94,.3)!important;}
/* 길안내 버튼 */
.nav-btn{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:6px 10px;font-size:12px;cursor:pointer;white-space:nowrap;transition:background .15s;flex-shrink:0;}
.nav-btn:hover{background:#1558b0;}
/* 일정표 캘린더 */
.cal-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.cal-title{font-size:18px;font-weight:800;color:var(--navy);flex:1;text-align:center;}
.cal-nav{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:7px 14px;font-size:14px;cursor:pointer;transition:all .15s;}
.cal-nav:hover{border-color:var(--blue);color:var(--blue);}
.cal-today{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.cal-legend{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.cal-legend-item{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px;}
/* 2주간 */
.biweek-wrap{background:#fff;border-radius:12px;border:1.5px solid var(--border);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.biweek-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.biweek-hd{padding:8px 4px;text-align:center;font-size:11px;font-weight:700;color:var(--muted);background:var(--navy);color:rgba(255,255,255,.6);letter-spacing:.5px;}
.biweek-hd.weekend{color:rgba(255,100,100,.8);}
.biweek-cell{min-height:90px;padding:6px;border-right:1px solid #f1f5f9;border-bottom:1px solid #f1f5f9;position:relative;}
.biweek-cell:nth-child(7n){border-right:none;}
.biweek-cell.today{background:#f0f6ff;}
.biweek-cell.weekend{background:#fafafa;}
.biweek-date{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:4px;}
.biweek-cell.today .biweek-date{background:var(--blue);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;}
/* 월간 */
.month-wrap{background:#fff;border-radius:12px;border:1.5px solid var(--border);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);}
.month-hd{padding:10px 4px;text-align:center;font-size:11px;font-weight:700;background:var(--navy);color:rgba(255,255,255,.6);letter-spacing:.5px;}
.month-hd.weekend{color:rgba(255,100,100,.8);}
.month-cell{min-height:110px;padding:6px 5px;border-right:1px solid #f1f5f9;border-bottom:1px solid #f1f5f9;}
.month-cell:nth-child(7n){border-right:none;}
.month-cell.today{background:#f0f6ff;}
.month-cell.weekend{background:#fafafa;}
.month-cell.other-month{opacity:.4;}
.month-date{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:3px;}
.month-cell.today .month-date{background:var(--blue);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;}
/* 일정 이벤트 */
.cal-event{padding:3px 6px;border-radius:5px;margin-bottom:3px;cursor:pointer;font-size:10px;line-height:1.4;transition:opacity .15s;}
.cal-event:hover{opacity:.8;}
.cal-event-time{font-weight:700;display:block;}
.cal-event-label{font-weight:600;display:block;}
.cal-event-client{display:block;opacity:.85;}
.status-row:last-child{border-bottom:none;}
.status-row-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .2s;}
.status-row-icon.done{background:var(--green);box-shadow:0 2px 8px rgba(34,197,94,.3);}
.status-row-icon.current{background:var(--blue);box-shadow:0 2px 8px rgba(30,111,217,.3);}
.status-row-icon.pending{background:var(--bg);color:var(--muted);}
.status-row-info{flex:1;}
.status-row-label{font-size:13px;font-weight:700;color:var(--navy);}
.status-row-label.current{color:var(--blue);}
.status-row-label.done{color:var(--green);}
.status-row-label.pending{color:var(--muted);}
.status-row-time{font-size:11px;color:var(--muted);margin-top:2px;}
.status-dt-input{border:1.5px solid var(--border);border-radius:8px;padding:7px 10px;font-size:12px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s;color:var(--text);background:#fff;}
.status-dt-input:focus{border-color:var(--blue);background:#f0f6ff;}
.status-dt-input.has-value{border-color:var(--green);background:#f0fdf4;}

/* 견적서 폼 */
.est-badge{display:inline-flex;align-items:center;gap:16px;background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;border-radius:10px;padding:12px 22px;margin-bottom:22px;flex-wrap:wrap;}
.est-badge-num{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--gold);}
.est-badge-label{font-size:10px;color:rgba(255,255,255,.4);margin-bottom:2px;}
.est-badge-sep{width:1px;height:30px;background:rgba(255,255,255,.1);}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;}
.info-field label{display:block;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.info-field input{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:8px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none;transition:border-color .15s;}
.info-field input:focus{border-color:var(--blue);background:#f0f6ff;}
.cat-section{margin-bottom:28px;}
.cat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.cat-header-left{display:flex;align-items:center;gap:10px;}
.cat-bar{width:4px;height:20px;background:var(--blue);border-radius:2px;}
.cat-name-input{font-size:16px;font-weight:800;color:var(--navy);background:transparent;border:none;border-bottom:2px solid transparent;outline:none;transition:border-color .15s;padding:2px 4px;font-family:'Noto Sans KR',sans-serif;}
.cat-name-input:hover{border-color:var(--border);}
.cat-name-input:focus{border-color:var(--blue);}
.cat-subtotal{font-size:12px;font-weight:700;color:var(--muted);background:var(--bg);padding:3px 10px;border-radius:20px;}
.cell-input{width:100%;background:transparent;border:none;border-bottom:1.5px solid transparent;outline:none;font-size:13px;font-family:'Noto Sans KR',sans-serif;color:var(--text);padding:2px 0;transition:border-color .15s,background .15s;}
.cell-input:hover{border-color:var(--border);}
.cell-input:focus{border-color:var(--blue);background:#eef4ff;border-radius:4px 4px 0 0;padding:2px 6px;}
.cell-input.r{text-align:right;}.cell-input.m{color:var(--muted);}
.img-lbl{cursor:pointer;display:block;}.img-prev{width:44px;height:33px;object-fit:cover;border-radius:6px;border:1.5px solid var(--border);}
.img-ph{width:44px;height:33px;border:1.5px dashed #cbd5e1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#94a3b8;}
.img-lbl:hover .img-ph{border-color:var(--blue);color:var(--blue);}
.del-btn{background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:15px;transition:color .15s;padding:2px 6px;}
.del-btn:hover{color:var(--red);}
.subtotal-row td{background:#f8faff;border-top:2px solid var(--border);}
.subtotal-lbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.subtotal-val{font-weight:800;color:var(--blue);font-size:14px;}
.grand-card{background:linear-gradient(135deg,var(--navy),#1a3a5c);border-radius:14px;padding:24px 28px;display:flex;align-items:center;justify-content:space-between;margin-top:12px;flex-wrap:wrap;gap:16px;}
.grand-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.45);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;}
.grand-val{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--gold);letter-spacing:2px;}
.grand-vat{font-size:12px;color:rgba(255,255,255,.35);margin-top:4px;}
.grand-breakdown{display:flex;gap:22px;flex-wrap:wrap;}
.bd-item{text-align:right;}.bd-label{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}.bd-val{font-size:15px;font-weight:700;color:rgba(255,255,255,.8);}
.pick-modal{display:flex;gap:0;height:520px;overflow:hidden;}
.pick-left{width:180px;background:var(--navy);border-radius:10px 0 0 10px;overflow-y:auto;flex-shrink:0;}
.pick-left-item{padding:12px 16px;cursor:pointer;font-size:13px;font-weight:600;color:rgba(255,255,255,.45);border-left:3px solid transparent;transition:all .15s;}
.pick-left-item:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.05);}
.pick-left-item.active{color:#fff;background:rgba(255,255,255,.08);border-left-color:var(--gold);}
.pick-right{flex:1;overflow-y:auto;padding:16px;background:#fff;border-radius:0 10px 10px 0;border:1.5px solid var(--border);border-left:none;}
.pick-prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;}
.pick-prod-card{border:1.5px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .15s;background:#fff;}
.pick-prod-card:hover{border-color:var(--blue);box-shadow:0 4px 16px rgba(30,111,217,.15);transform:translateY(-1px);}
.pick-prod-img{width:100%;height:90px;object-fit:cover;background:var(--bg);}
.pick-prod-img-ph{width:100%;height:90px;background:linear-gradient(135deg,#f1f5f9,#e2e8f0);display:flex;align-items:center;justify-content:center;font-size:26px;color:#94a3b8;}
.pick-prod-info{padding:10px;}
.pick-prod-name{font-size:12px;font-weight:700;color:var(--navy);margin-bottom:2px;}
.pick-prod-price{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--blue);}
.pick-prod-add{display:flex;align-items:center;justify-content:center;background:var(--blue);color:#fff;font-size:12px;font-weight:700;padding:7px;cursor:pointer;transition:background .15s;font-family:'Noto Sans KR',sans-serif;border:none;width:100%;}
.pick-prod-add:hover{background:#1558b0;}
.pick-cat-bar{background:var(--bg);border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.pick-cat-bar label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;white-space:nowrap;}
.pick-cat-bar select{flex:1;border:1.5px solid var(--border);border-radius:7px;padding:7px 10px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;}

/* ★ 현장사진 */
.site-photos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-top:4px;}
.site-photo-item{position:relative;border-radius:10px;overflow:hidden;border:1.5px solid var(--border);aspect-ratio:4/3;background:var(--bg);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.site-photo-img{width:100%;height:100%;object-fit:cover;}
.site-photo-del{position:absolute;top:5px;right:5px;background:rgba(0,0,0,.6);border:none;color:#fff;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;line-height:1;display:flex;align-items:center;justify-content:center;}
.site-photo-del:hover{background:var(--red);}
.site-photo-add{border:2px dashed var(--border)!important;background:transparent;flex-direction:column;gap:6px;font-size:12px;font-weight:600;color:var(--muted);transition:all .15s;cursor:pointer;}
.site-photo-add:hover{border-color:var(--blue)!important;color:var(--blue);background:#f0f6ff!important;}
.site-photo-add-icon{font-size:26px;}

/* ★ 결제 정보 */
.pay-status-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.pay-status-btn{padding:9px 22px;border-radius:20px;border:2px solid var(--border);font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;background:#fff;color:var(--muted);}
.pay-status-btn:hover{border-color:var(--blue);color:var(--blue);}
.pay-status-btn.ps-입금전{background:#fee2e2;color:#b91c1c;border-color:#fca5a5;}
.pay-status-btn.ps-계약{background:#fef9c3;color:#854d0e;border-color:#fde047;}
.pay-status-btn.ps-완료{background:#dcfce7;color:#166534;border-color:#86efac;}
.pay-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
@media(max-width:700px){.pay-grid{grid-template-columns:1fr;}}
.pay-field{background:var(--bg);border-radius:10px;padding:14px 16px;}
.pay-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
.pay-input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .15s;background:#fff;text-align:right;}
.pay-input:focus{border-color:var(--blue);background:#f0f6ff;}
.pay-input.auto{background:transparent;border-color:transparent;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.5px;cursor:default;color:var(--navy);}
.pay-input.auto.zero{color:var(--green);}
.pay-sub{font-size:11px;color:var(--muted);margin-top:4px;text-align:right;}
.pay-check-row{display:flex;align-items:center;gap:8px;margin-top:10px;}
.pay-check{width:16px;height:16px;cursor:pointer;accent-color:var(--green);}
.pay-check-lbl{font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;}
.pay-check-lbl.on{color:var(--green);}
/* ══ 공급사 관리 ══ */
.supplier-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.supplier-card{background:#fff;border-radius:12px;border:1.5px solid var(--border);padding:18px;cursor:pointer;transition:all .2s;box-shadow:0 2px 6px rgba(0,0,0,.04);}
.supplier-card:hover,.supplier-card.active{border-color:var(--blue);box-shadow:0 4px 16px rgba(30,111,217,.12);}
.supplier-card.active{background:#f0f6ff;}
.supplier-name{font-size:16px;font-weight:900;color:var(--navy);margin-bottom:8px;}
.supplier-info-row{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--muted);margin-bottom:4px;}
.supplier-info-label{font-weight:700;min-width:70px;color:var(--text);}
/* 발주서 */
.order-section{border:1.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:18px;}
.order-section-header{background:var(--navy);color:#fff;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.order-supplier-name{font-size:15px;font-weight:800;letter-spacing:.5px;}
.order-supplier-meta{font-size:11px;color:rgba(255,255,255,.6);margin-top:2px;}
.order-table{width:100%;border-collapse:collapse;}
.order-table th{background:var(--bg);font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;padding:8px 10px;text-align:left;border-bottom:1.5px solid var(--border);}
.order-table td{padding:9px 10px;border-bottom:1px solid #f1f5f9;font-size:13px;}
.order-table tr:last-child td{border-bottom:none;}
.order-table .qty-input{width:70px;padding:5px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:'Noto Sans KR',sans-serif;text-align:right;}
.order-table .qty-input:focus{outline:none;border-color:var(--blue);}
.order-footer{padding:12px 18px;background:var(--bg);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.order-total{font-size:16px;font-weight:900;color:var(--navy);}
.order-total span{color:var(--gold);}
.cart-badge{position:relative;}
.cart-count{position:absolute;top:-8px;right:-8px;background:var(--red);color:#fff;border-radius:50%;width:18px;height:18px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;}
@media(max-width:767px){
    .supplier-grid{grid-template-columns:1fr;}
    .order-table{font-size:12px;}
    .order-table th,.order-table td{padding:6px 8px;}
}

/* ══ 견적목록 대시보드 카드 ══ */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
.dash-card{background:#fff;border-radius:12px;border:1.5px solid var(--border);padding:14px 16px;cursor:pointer;transition:all .2s;text-align:center;}
.dash-card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:0 4px 16px rgba(30,111,217,.1);}
.dash-card.active{border-color:currentColor;box-shadow:0 4px 16px rgba(0,0,0,.1);}
.dash-card-num{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;line-height:1;}
.dash-card-label{font-size:11px;font-weight:700;letter-spacing:.5px;margin-top:4px;}
.dash-card-type{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.dash-section-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.dash-section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.filter-active-bar{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding:8px 12px;background:var(--bg);border-radius:8px;font-size:12px;font-weight:600;color:var(--muted);}
.filter-active-bar button{background:none;border:none;cursor:pointer;font-size:14px;color:var(--muted);}
.filter-active-bar button:hover{color:var(--red);}

/* ══ 포트폴리오 ══ */
.port-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;}
.port-card{background:#fff;border-radius:12px;border:1.5px solid var(--border);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);transition:all .2s;}
.port-card:hover{box-shadow:0 8px 24px rgba(0,0,0,.1);transform:translateY(-2px);}
.port-card-img{width:100%;height:160px;object-fit:cover;background:var(--bg);}

<body><div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const fmt = n => (Number(n)||0).toLocaleString('ko-KR');
const genEstNo = () => { const d=new Date(); return `LS-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}-${String(Math.floor(Math.random()*9000)+1000)}`; };
const uid = () => Math.random().toString(36).substr(2,9);
let _tt; const toast = msg=>{const el=document.getElementById('__toast');if(!el)return;el.textContent=msg;el.style.display='block';clearTimeout(_tt);_tt=setTimeout(()=>el.style.display='none',2800);};

// ★ 상태 목록
const STATUS_LIST = ['가견적발송','방문상담 및 실측','견적예정','제작중','설치완료'];
const STATUS_COLOR = {'가견적발송':'#1e6fd9','방문상담 및 실측':'#f97316','견적예정':'#7c3aed','제작중':'#ca8a04','설치완료':'#16a34a'};
const STATUS_BG    = {'가견적발송':'#dbeafe','방문상담 및 실측':'#ffedd5','견적예정':'#ede9fe','제작중':'#fef9c3','설치완료':'#dcfce7'};
const STATUS_ICON  = {'가견적발송':'📤','방문상담 및 실측':'🏠','견적예정':'✅','제작중':'🔧','설치완료':'🎉'};

const StatusBadge = ({status}) => (
    <span className="status-badge" style={{background:STATUS_BG[status]||'#f1f5f9',color:STATUS_COLOR[status]||'#64748b'}}>
        {STATUS_ICON[status]||'•'} {status}
    </span>
);

const FEATURES=[['📦','자재관리','분류별 자재·단가·공급업체'],['🛍','상품관리','카테고리별 상품+필요자재'],['📋','견적관리','저장·목록·진행상태 관리'],['📊','엑셀/인쇄','원클릭 견적서 저장']];

/* ★ Supabase Storage 업로드 유틸 (base64 폴백 포함) */
const BUCKET = 'lucky-star';
const uploadImg = async (sb, file, folder='uploads') => {
    if(sb){
        try{
            const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
            const path=`${folder}/${Date.now()}_${Math.random().toString(36).substr(2,8)}.${ext}`;
            const{error}=await sb.storage.from(BUCKET).upload(path,file,{upsert:true,contentType:file.type});
            if(!error){
                const{data:{publicUrl}}=sb.storage.from(BUCKET).getPublicUrl(path);
                return publicUrl;
            }
            console.warn('Storage upload error:',error.message,'→ fallback base64');
        }catch(e){console.warn('Storage exception:',e,'→ fallback base64');}
    }
    return new Promise(res=>{const r=new FileReader();r.onloadend=()=>res(r.result);r.readAsDataURL(file);});
};

function ImgUpload({sb,folder='uploads',value,onChange}){
    const[busy,setBusy]=useState(false);
    const pick=async e=>{
        const f=e.target.files[0];if(!f)return;
        setBusy(true);
        try{const url=await uploadImg(sb,f,folder);onChange(url);}
        finally{setBusy(false);}
    };
    return(<label className="img-area" style={{display:'block',cursor:'pointer'}}>
        {busy?<div className="img-placeholder"><span style={{fontSize:28}}>⏳</span>업로드 중...</div>:
         value?<img src={value} alt="" style={{maxHeight:130,maxWidth:'100%',borderRadius:8,objectFit:'cover'}}/>:
         <div className="img-placeholder"><span>📷</span>클릭하여 사진 업로드</div>}
        <input type="file" accept="image/*" style={{display:'none'}} onChange={pick}/>
    </label>);
}
function AddNameModal({title,placeholder,onClose,onSave}){
    const[name,setName]=useState('');
    return(<div className="modal-overlay" onClick={onClose}><div className="modal-box sm" onClick={e=>e.stopPropagation()}><div className="modal-header"><div className="modal-title">{title}</div><button className="modal-close" onClick={onClose}>✕</button></div><div className="mf"><label className="ml">이름</label><input className="mi" value={name} onChange={e=>setName(e.target.value)} placeholder={placeholder} autoFocus onKeyDown={e=>e.key==='Enter'&&name.trim()&&onSave(name.trim())}/></div><div className="modal-btns"><button className="modal-cancel" onClick={onClose}>취소</button><button className="modal-ok" onClick={()=>name.trim()&&onSave(name.trim())}>추가</button></div></div></div>);
}

/* ── 설정/로그인 ── */
function SetupScreen({onDone}){const[url,setUrl]=useState('');const[key,setKey]=useState('');const save=()=>{if(url&&key){localStorage.setItem('supabase_config',JSON.stringify({url,key}));onDone({url,key});}};return(<div className="login-wrap"><div className="login-left"><div className="login-logo">LUCKY<span>STAR</span></div><div className="login-tagline">Camping Caravan Management</div>{FEATURES.map(([i,t,d])=><div className="lf-item" key={t}><div className="lf-icon">{i}</div><div className="lf-text"><strong>{t}</strong><span>{d}</span></div></div>)}</div><div className="login-right"><div className="login-title">⚙️ 초기 설정</div><div className="login-sub">Supabase 프로젝트 정보를 입력하면 데이터가 자동으로 연결됩니다.</div><div className="setup-block"><div className="setup-block-title">Supabase 연결 정보</div><div className="field"><label>Project URL</label><input value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://xxxx.supabase.co"/></div><div className="field"><label>anon public Key</label><input value={key} onChange={e=>setKey(e.target.value)} placeholder="eyJ..."/></div></div><button className="btn btn-primary" style={{width:'100%',padding:14,fontSize:15,justifyContent:'center'}} onClick={save}>저장하고 시작하기</button><div className="login-notice" style={{marginTop:16}}>입력 정보는 브라우저에만 저장됩니다.</div></div></div>);}
/* ── 승인 대기 화면 ── */
const ADMIN_EMAIL = 'kyuill75@gmail.com';

/* ═══════════════════════════════════════
   ★ 사용자 승인 관리 페이지
═══════════════════════════════════════ */
function UserApprovalPage({sb, user}){
    const[approvedList,setApprovedList]=useState([]);
    const[newEmail,setNewEmail]=useState('');
    const[loading,setLoading]=useState(true);

    useEffect(()=>{
        if(!sb)return;
        sb.from('approved_users').select('*').order('email')
          .then(({data})=>{if(data)setApprovedList(data);setLoading(false);});
    },[sb]);

    const addEmails=async()=>{
        const list=newEmail.split(/[,; ]+/).map(e=>e.trim().toLowerCase()).filter(e=>e.includes('@'));
        if(!list.length){alert('유효한 이메일 주소를 입력하세요');return;}
        for(const email of list){
            await sb.from('approved_users').upsert([{email}],{onConflict:'email'});
        }
        const{data}=await sb.from('approved_users').select('*').order('email');
        if(data)setApprovedList(data);
        setNewEmail('');
        toast('OK '+list.length+'개 계정 승인됨');
    };

    const remove=async id=>{
        if(!confirm('이 계정의 승인을 취소하시겠습니까?'))return;
        await sb.from('approved_users').delete().eq('id',id);
        setApprovedList(p=>p.filter(x=>x.id!==id));
        toast('삭제됨');
    };

    if(loading)return<div className="loading-wrap"><div className="loading-spinner"/></div>;
    return(<div>
        <div className="page-header">
            <div className="page-title-wrap">
                <h1>👥 사용자 승인 관리</h1>
                <p>로그인 허용 Google 계정 관리 · 관리자 전용</p>
            </div>
        </div>
        <div className="card">
            <div className="card-title">새 계정 승인</div>
            <div className="mf">
                <label className="ml">이메일 주소 (쉼표·공백으로 여러 개 입력 가능)</label>
                <input className="mi" value={newEmail} onChange={e=>setNewEmail(e.target.value)}
                    placeholder="user@gmail.com, user2@gmail.com"
                    onKeyDown={e=>{if(e.key==='Enter')addEmails();}}/>
            </div>
            <button className="btn btn-primary" style={{marginTop:8}} onClick={addEmails}>＋ 승인 추가</button>
        </div>
        <div className="card">
            <div className="card-title">승인된 계정 ({approvedList.length})</div>
            {approvedList.length===0
                ?<p style={{fontSize:12,color:'var(--muted)'}}>승인된 계정이 없습니다.</p>
                :<div>
                    {approvedList.map(u=>(
                        <div key={u.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
                            <span style={{fontSize:18}}>{u.email===ADMIN_EMAIL?'👑':'👤'}</span>
                            <span style={{flex:1,fontSize:13,fontWeight:600}}>{u.email}</span>
                            {u.email===ADMIN_EMAIL
                                ?<span style={{fontSize:11,color:'var(--gold)',fontWeight:700}}>관리자</span>
                                :<button className="btn btn-sm" style={{background:'#fee2e2',color:'var(--red)',border:'none'}} onClick={()=>remove(u.id)}>승인취소</button>}
                        </div>
                    ))}
                </div>}
        </div>
    </div>);
}

function AccessDenied({user, sb, onLogout, onApprove}){
    const isAdmin = user?.email === ADMIN_EMAIL;
    const[pendingEmails,setPendingEmails]=useState('');
    const[approvedList,setApprovedList]=useState([]);
    const[loadingList,setLoadingList]=useState(false);

    useEffect(()=>{
        if(!isAdmin||!sb)return;
        setLoadingList(true);
        sb.from('approved_users').select('*').order('email').then(({data})=>{if(data)setApprovedList(data);setLoadingList(false);});
    },[isAdmin,sb]);

    const approve=async()=>{
        const emails=pendingEmails.split(/[\n,;]/).map(e=>e.trim().toLowerCase()).filter(e=>e&&e.includes('@'));
        if(!emails.length){alert('이메일을 입력하세요');return;}
        for(const email of emails){
            await sb.from('approved_users').upsert([{email}],{onConflict:'email'});
        }
        const{data}=await sb.from('approved_users').select('*').order('email');
        if(data)setApprovedList(data);
        setPendingEmails('');
        alert(emails.length+'개 계정이 승인됐습니다.');
    };
    const revoke=async id=>{
        if(!confirm('승인을 취소하시겠습니까?'))return;
        await sb.from('approved_users').delete().eq('id',id);
        setApprovedList(p=>p.filter(x=>x.id!==id));
    };

    if(isAdmin) return(
        <div style={{minHeight:'100vh',background:'var(--bg)',padding:'30px 20px',fontFamily:'Noto Sans KR,sans-serif'}}>
            <div style={{maxWidth:600,margin:'0 auto'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:24}}>

function LoginScreen({sb}){
    const[loading,setLoading]=useState(false);

    // ★ 인앱 브라우저 감지 (카카오톡·네이버 등만 차단, Chrome/Safari 허용)
    const isInApp=(()=>{
        try{
            const ua=window.navigator&&window.navigator.userAgent?window.navigator.userAgent:'';
            const lc=ua.toLowerCase();
            if(lc.indexOf('kakaotalk')>=0) return true;
            if(ua.indexOf('NAVER')>=0||ua.indexOf('NaverSearch')>=0) return true;
            if(ua.indexOf('Line/')>=0&&ua.indexOf('Line/0')<0) return true;
            if(ua.indexOf('Instagram/')>=0||ua.indexOf('FB_IAB')>=0||ua.indexOf('FBAN')>=0) return true;
            if(ua.indexOf('Snapchat/')>=0) return true;
            if(ua.indexOf('Android')>=0&&(ua.indexOf('; wv)')>=0||ua.indexOf(' wv)')>=0)) return true;
            return false;
        }catch(e){return false;}
    })();

    const copyUrl=()=>{
        navigator.clipboard?.writeText(window.location.href).then(()=>alert('주소가 복사됐습니다. Chrome 또는 Safari 브라우저에서 붙여넣기 하세요.')).catch(()=>alert('주소: '+window.location.href));

                    <div className="inapp-step">

function SupplierList({sb,suppliers,setSuppliers}){
    const[materials,setMaterials]=useState([]);
    useEffect(()=>{if(!sb)return;sb.from('materials').select('id,name,specification,thickness,unit_price,stock_qty,supplier').order('name').then(({data})=>{if(data)setMaterials(data);});},[sb]);
    const[showModal,setShowModal]=useState(false);const[editing,setEditing]=useState(null);
    const[activeSup,setActiveSup]=useState(null);

    const save=async form=>{
        setShowModal(false);setEditing(null);
        if(editing){
            const{data}=await sb.from('suppliers').update(form).eq('id',editing.id).select();
            if(data)setSuppliers(p=>p.map(s=>s.id===editing.id?data[0]:s));toast('✅ 수정됨');
        }else{
            const{data}=await sb.from('suppliers').insert([form]).select();
            if(data)setSuppliers(p=>[...p,data[0]]);toast('✅ 공급사 등록됨');
        }
    };
    const del=async id=>{
        if(!confirm('삭제하시겠습니까?'))return;
        await sb.from('suppliers').delete().eq('id',id);
        setSuppliers(p=>p.filter(s=>s.id!==id));
        if(activeSup?.id===id)setActiveSup(null);
        toast('🗑 삭제됨');
    };

    // 선택된 공급사의 자재만 필터
    const supMaterials=activeSup?materials.filter(m=>m.supplier===activeSup.name):[];

    return(<div>
        {showModal&&<SupplierModal initial={editing} onClose={()=>{setShowModal(false);setEditing(null);}} onSave={save}/>}
        <div className="page-header">
            <div className="page-title-wrap"><h1>🏢 공급사 관리</h1><p>거래 공급업체 정보 · 자재별 공급사 현황</p></div>
            <div className="btn-row"><button className="btn btn-primary" onClick={()=>{setEditing(null);setShowModal(true);}}>＋ 공급사 등록</button></div>
        </div>

        <div style={{display:'grid',gridTemplateColumns:activeSup?'300px 1fr':'1fr',gap:20,alignItems:'start'}}>
            {/* 공급사 카드 목록 */}
            <div>
                <div style={{fontSize:10,fontWeight:700,color:'var(--muted)',letterSpacing:1.5,textTransform:'uppercase',marginBottom:10}}>업체 목록 ({suppliers.length})</div>
                {suppliers.length===0?<div className="empty-state" style={{minHeight:120}}><div className="empty-icon">🏢</div><div className="empty-text">등록된 공급사가 없습니다.</div></div>
                :<div style={{display:'flex',flexDirection:'column',gap:10}}>
                    {suppliers.sort((a,b)=>a.name.localeCompare(b.name,'ko')).map(s=>(
                        <div key={s.id} className={`supplier-card ${activeSup?.id===s.id?'active':''}`} onClick={()=>setActiveSup(p=>p?.id===s.id?null:s)}>
                            <div className="supplier-name">🏢 {s.name}</div>
                            {s.business_no&&<div className="supplier-info-row"><span className="supplier-info-label">사업자번호</span><span>{s.business_no}</span></div>}
                            {s.contact_person&&<div className="supplier-info-row"><span className="supplier-info-label">담당자</span><span>{s.contact_person}</span></div>}
                            {s.phone&&<div className="supplier-info-row"><span className="supplier-info-label">연락처</span><span>{s.phone}</span></div>}
                            {s.order_to&&<div className="supplier-info-row"><span className="supplier-info-label">발주처</span><span style={{color:'var(--blue)'}}>{s.order_to}</span></div>}
                            <div style={{display:'flex',gap:6,marginTop:10}}>
                                <button className="btn btn-outline btn-sm" onClick={e=>{e.stopPropagation();setEditing(s);setShowModal(true);}}>✏️ 수정</button>
                                <button className="btn btn-sm" style={{background:'#fee2e2',color:'var(--red)',border:'none'}} onClick={e=>{e.stopPropagation();del(s.id);}}>🗑</button>
                            </div>
                        </div>
                    ))}
                </div>}
            </div>

            {/* 선택된 공급사의 자재 목록 */}
            {activeSup&&<div>
                <div style={{fontSize:10,fontWeight:700,color:'var(--muted)',letterSpacing:1.5,textTransform:'uppercase',marginBottom:10}}>
                    {activeSup.name} 자재 ({supMaterials.length}개)

                {supMaterials.length===0?<div className="empty-state" style={{minHeight:120}}><div className="empty-icon">📦</div><div className="empty-text">등록된 자재가 없습니다.</div></div>
                :<div className="table-wrap"><table style={{minWidth:400}}>
                    <thead><tr>
                        <th style={{textAlign:'left'}}>품명</th>

                        <th style={{textAlign:'left'}}>두께</th>
                        <th className="tr">단가(원)</th>
                        <th className="tr">재고</th>
                    </tr></thead>
                    <tbody>{supMaterials.sort((a,b)=>a.name.localeCompare(b.name,'ko')).map(m=>(
                        <tr key={m.id}>
                            <td style={{fontWeight:700}}>{m.name}</td>
                            <td style={{fontSize:12,color:'var(--muted)'}}>{m.specification||'-'}</td>
                            <td style={{fontSize:12,color:'var(--muted)'}}>{m.thickness||'-'}</td>
                            <td className="tr" style={{fontWeight:700}}>{fmt(m.unit_price||0)}</td>
                            <td className="tr" style={{color:(m.stock_qty||0)<=0?'var(--red)':'inherit',fontWeight:700}}>{m.stock_qty||0}</td>
                        </tr>
                    ))}</tbody>
                </table></div>}
            </div>}
        </div>
    </div>);
}
