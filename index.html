function EstimateList({sb,onEdit,onNew}){
    const[estimates,setEstimates]=useState([]);
    const[loading,setLoading]=useState(true);
    const[statusFilter,setStatusFilter]=useState(null);
    const[payFilter,setPayFilter]=useState(null);

    useEffect(()=>{
        if(!sb)return;
        (async()=>{setLoading(true);const{data}=await sb.from('estimates').select('*').order('created_at',{ascending:false});if(data)setEstimates(data);setLoading(false);})();
    },[sb]);

    const changeStatus=async(id,status)=>{
        const est=estimates.find(e=>e.id===id);
        let nd={};try{nd=typeof est?.status_dates==='string'?JSON.parse(est?.status_dates||'{}'):(est?.status_dates||{});}catch{}
        if(!nd[status])nd[status]=new Date().toISOString();
        await sb.from('estimates').update({status,status_dates:JSON.stringify(nd)}).eq('id',id);
        setEstimates(p=>p.map(e=>e.id===id?{...e,status}:e));
        toast('✅ 상태 변경: '+status);
    };
    const del=async id=>{
        if(!confirm('견적서를 삭제하시겠습니까?'))return;
        await sb.from('estimates').delete().eq('id',id);
        setEstimates(p=>p.filter(e=>e.id!==id));toast('🗑 삭제됨');
    };

    const STATUS_DASH=['가견적발송','방문상담 및 실측','견적예정','제작중'];
    const PAY_DASH=['입금전','계약'];
    const sCount=s=>estimates.filter(e=>(e.status||'가견적발송')===s).length;
    const pCount=p=>estimates.filter(e=>(e.payment_status||'입금전')===p).length;
    const STATUS_DASH_STYLE={'가견적발송':{color:STATUS_COLOR['가견적발송'],bg:STATUS_BG['가견적발송']},'방문상담 및 실측':{color:STATUS_COLOR['방문상담 및 실측'],bg:STATUS_BG['방문상담 및 실측']},'견적예정':{color:STATUS_COLOR['견적예정'],bg:STATUS_BG['견적예정']},'제작중':{color:STATUS_COLOR['제작중'],bg:STATUS_BG['제작중']}};
    const PAY_STYLE={'입금전':{color:'#b91c1c',bg:'#fee2e2'},'계약':{color:'#854d0e',bg:'#fef9c3'}};

    const filtered=estimates.filter(e=>{
        if(statusFilter&&(e.status||'가견적발송')!==statusFilter)return false;
        if(payFilter&&(e.payment_status||'입금전')!==payFilter)return false;
        return true;
    });
    const toggleSF=s=>setStatusFilter(p=>p===s?null:s);
    const togglePF=p=>setPayFilter(p2=>p2===p?null:p);

    if(loading)return<div className="loading-wrap"><div className="loading-spinner"/></div>;

    return(<div>
        <div className="page-header">
            <div className="page-title-wrap"><h1>📂 견적 목록</h1><p>카드 클릭으로 필터링 · 상태 변경 가능</p></div>
            <div className="btn-row"><button className="btn btn-primary" onClick={onNew}>＋ 새 견적서</button></div>
        </div>

        <div className="dash-section-title">진행상태</div>
        <div className="dash-grid" style={{marginBottom:10}}>
            {STATUS_DASH.map(s=>{
                const st=STATUS_DASH_STYLE[s]||{};const isActive=statusFilter===s;
                return(<div key={s} className={`dash-card ${isActive?'active':''}`}
                    style={{color:st.color,background:isActive?st.bg:'#fff',borderColor:isActive?st.color:'var(--border)'}}
                    onClick={()=>toggleSF(s)}>
                    <div className="dash-card-type">진행상태</div>
                    <div className="dash-card-num">{sCount(s)}</div>
                    <div className="dash-card-label">{STATUS_ICON[s]} {s}</div>
                </div>);
            })}
        </div>

        <div className="dash-section-title" style={{marginTop:4}}>결제상태</div>
        <div className="dash-grid" style={{gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',marginBottom:18}}>
            {PAY_DASH.map(p=>{
                const st=PAY_STYLE[p]||{};const isActive=payFilter===p;
                return(<div key={p} className={`dash-card ${isActive?'active':''}`}
                    style={{color:st.color,background:isActive?st.bg:'#fff',borderColor:isActive?st.color:'var(--border)'}}
                    onClick={()=>togglePF(p)}>
                    <div className="dash-card-type">결제상태</div>
                    <div className="dash-card-num">{pCount(p)}</div>
                    <div className="dash-card-label">{p==='입금전'?'⏳':'📝'} {p}</div>
                </div>);
            })}
        </div>

        {(statusFilter||payFilter)&&(
            <div className="filter-active-bar">
                <span>🔍 필터:</span>
                {statusFilter&&<span style={{color:STATUS_COLOR[statusFilter]||'var(--navy)',fontWeight:800}}>{STATUS_ICON[statusFilter]} {statusFilter}</span>}
                {statusFilter&&payFilter&&<span>+</span>}
                {payFilter&&<span style={{color:PAY_STYLE[payFilter]?.color,fontWeight:800}}>{payFilter}</span>}
                <span style={{marginLeft:'auto',color:'var(--muted)',fontSize:11}}>{filtered.length}건</span>
                <button onClick={()=>{setStatusFilter(null);setPayFilter(null);}}>✕</button>
            </div>
        )}

        {estimates.length===0
            ?<div className="empty-state"><div className="empty-icon">📂</div><div className="empty-text">저장된 견적서가 없습니다.</div></div>
            :filtered.length===0
            ?<div className="empty-state"><div className="empty-icon">🔍</div><div className="empty-text">해당 조건의 견적서가 없습니다.<br/><button className="btn btn-outline btn-sm" style={{marginTop:8}} onClick={()=>{setStatusFilter(null);setPayFilter(null);}}>필터 초기화</button></div></div>
            :<div className="est-list-wrap" style={{overflowX:'auto'}}><table style={{minWidth:600}}>
                <thead><tr>
                    <th style={{textAlign:'left'}}>견적번호</th>
                    <th style={{textAlign:'left'}}>고객명</th>
                    <th style={{textAlign:'left'}}>연락처</th>
                    <th className="tr">공급가액(원)</th>
                    <th style={{textAlign:'left',minWidth:180}}>진행상태</th>
                    <th style={{textAlign:'left'}}>결제</th>
                    <th style={{textAlign:'left'}}>작성일</th>
                    <th className="tc" style={{width:80}}>관리</th>
                </tr></thead>
                <tbody>
                    {filtered.map(est=>{
                        const ps=est.payment_status||'입금전';
                        const pst=PAY_STYLE[ps]||{};
                        return(<tr key={est.id}>
                            <td><div className="est-no">{est.est_no||est.id?.substr(0,8).toUpperCase()}</div></td>
                            <td><div className="est-client">{est.client_name||'-'}</div></td>
                            <td style={{fontSize:12,color:'var(--muted)'}}>{est.client_phone||'-'}</td>
                            <td className="tr"><div className="est-amount">{fmt(est.total_supply||0)}</div></td>
                            <td>
                                <select className="status-select" value={est.status||'가견적발송'}
                                    onChange={e=>changeStatus(est.id,e.target.value)}
                                    style={{fontWeight:700,color:STATUS_COLOR[est.status]||'#64748b',background:STATUS_BG[est.status]||'#f1f5f9',border:'1.5px solid #e2e8f0'}}>
                                    {STATUS_LIST.map(s=><option key={s} value={s}>{STATUS_ICON[s]} {s}</option>)}
                                </select>
                            </td>
                            <td><span style={{fontSize:11,fontWeight:700,color:pst.color,background:pst.bg,padding:'2px 8px',borderRadius:10,whiteSpace:'nowrap'}}>{ps==='입금전'?'⏳':ps==='계약'?'📝':'✅'} {ps}</span></td>
                            <td style={{fontSize:12,color:'var(--muted)'}}>{est.created_at?new Date(est.created_at).toLocaleDateString('ko-KR'):'-'}</td>
                            <td className="tc">
                                <button className="btn-icon" onClick={()=>onEdit(est.id)}>✏️</button>
                                <button className="btn-icon" onClick={()=>del(est.id)}>🗑</button>
                            </td>
                        </tr>);
                    })}
                </tbody>
            </table></div>}
    </div>);
}

   ★ 일정표

const SCHED_MAP={'방문상담 및 실측':{label:'방문상담',color:'#c2410c',bg:'#ffedd5'},'견적예정':{label:'견적예정',color:'#6d28d9',bg:'#ede9fe'},'제작중':{label:'설치예정',color:'#92400e',bg:'#fef9c3'}};

function Schedule({sb,onEditEst}){
    const[view,setView]=useState('biweek');
    const[base,setBase]=useState(new Date());
    const[estimates,setEstimates]=useState([]);
    const[loading,setLoading]=useState(true);
    const[popup,setPopup]=useState(null);

    useEffect(()=>{
        if(!sb)return;
        (async()=>{setLoading(true);const{data}=await sb.from('estimates').select('*').order('created_at',{ascending:false});if(data)setEstimates(data);setLoading(false);})();
    },[sb]);

    const getEvents=()=>{
        const evts=[];
        const schedOrder=['방문상담 및 실측','견적예정','제작중']; // 진행 순서
        estimates.forEach(est=>{
            let dates={};try{dates=typeof est.status_dates==='string'?JSON.parse(est.status_dates||'{}'):(est.status_dates||{});}catch{}
            let checked={};try{checked=typeof est.status_checked==='string'?JSON.parse(est.status_checked||'{}'):(est.status_checked||{});}catch{}
            // 날짜+완료체크 모두 된 상태 중 가장 마지막(최종) 상태만 표시
            let lastStatus=null;
            schedOrder.forEach(status=>{
                if(dates[status]&&checked[status]===true) lastStatus=status;
            });
            if(lastStatus){
                const info=SCHED_MAP[lastStatus];
                const d=new Date(dates[lastStatus]);
                if(!isNaN(d))evts.push({date:d,label:info.label,color:info.color,bg:info.bg,clientName:est.client_name||'고객',time:d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}),est});
            }
        });
        return evts;
    };

    const events=getEvents();
    const forDay=d=>events.filter(e=>e.date.getFullYear()===d.getFullYear()&&e.date.getMonth()===d.getMonth()&&e.date.getDate()===d.getDate()).sort((a,b)=>a.date-b.date);

    const EventChip=({ev})=>(<div className="cal-event" style={{background:ev.bg,color:ev.color}} onClick={()=>setPopup(ev.est)}>
        <span className="cal-event-time">{ev.time}</span>
        <span className="cal-event-label">{ev.label}</span>
        <span className="cal-event-client">{ev.clientName}</span>
    </div>);

    const DAY_NAMES=['월','화','수','목','금','토','일'];

    const renderBiweek=()=>{
        const today=new Date(base);const dow=today.getDay();const mon=new Date(today);mon.setDate(today.getDate()-(dow===0?6:dow-1));
        const days=Array.from({length:14},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
        return(<div className="biweek-wrap">
            <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)'}}>
                {DAY_NAMES.map((d,i)=><div key={i} className={`biweek-hd ${i>=5?'weekend':''}`}>{d}</div>)}
                {DAY_NAMES.map((d,i)=><div key={i+7} className={`biweek-hd ${i>=5?'weekend':''}`}>{d}</div>)}
            </div>
            <div className="biweek-grid">
                {days.map((day,i)=>{const isToday=day.toDateString()===new Date().toDateString();const evts=forDay(day);return(
                    <div key={i} className={`biweek-cell ${isToday?'today':''} ${i%7>=5?'weekend':''}`}>
                        <div className="biweek-date">{day.getDate()}</div>
                        {evts.map((ev,j)=><EventChip key={j} ev={ev}/>)}
                    </div>);})}
            </div>
        </div>);
    };

    const renderMonth=()=>{
        const y=base.getFullYear(),m=base.getMonth();const first=new Date(y,m,1);
        const start=new Date(first);const fd=first.getDay();start.setDate(first.getDate()-(fd===0?6:fd-1));
        const days=[];const d=new Date(start);const last=new Date(y,m+1,0);
        while(d<=last||days.length%7!==0){days.push(new Date(d));d.setDate(d.getDate()+1);if(days.length>42)break;}
        return(<div className="month-wrap">
            <div className="month-grid">
                {DAY_NAMES.map((d,i)=><div key={i} className={`month-hd ${i>=5?'weekend':''}`}>{d}</div>)}
                {days.map((day,i)=>{const isToday=day.toDateString()===new Date().toDateString();const other=day.getMonth()!==m;const evts=forDay(day);return(
                    <div key={i} className={`month-cell ${isToday?'today':''} ${other?'other-month':''} ${i%7>=5?'weekend':''}`}>
                        <div className="month-date">{day.getDate()}</div>
                        {evts.map((ev,j)=><EventChip key={j} ev={ev}/>)}
                    </div>);})}
            </div>
        </div>);
    };

    if(loading)return<div className="loading-wrap"><div className="loading-spinner"/></div>;

    return(<div>
        {popup&&(<div className="modal-overlay" onClick={()=>setPopup(null)}>
            <div className="modal-box sm" onClick={e=>e.stopPropagation()}>
                <div className="modal-header"><div className="modal-title">📋 {popup.client_name||'고객'} 견적서</div><button className="modal-close" onClick={()=>setPopup(null)}>✕</button></div>
                <div style={{display:'flex',flexDirection:'column',gap:10,padding:'4px 0 8px'}}>
                    {[['견적번호',popup.est_no],['연락처',popup.client_phone||'-'],['주소',popup.client_address||'-'],['공급가액',fmt(popup.total_supply||0)+'원'],['결제상태',popup.payment_status||'-']].map(([l,v])=>(
                        <div key={l} style={{display:'flex',gap:12,fontSize:13}}>
                            <span style={{color:'var(--muted)',fontWeight:700,minWidth:60,fontSize:11,textTransform:'uppercase'}}>{l}</span>
                            <span style={{fontWeight:600,color:'var(--navy)'}}>{v}</span>
                        </div>
                    ))}
                    <div style={{marginTop:4}}><StatusBadge status={popup.status||'가견적발송'}/></div>
                </div>
                <div className="modal-btns">
                    <button className="modal-cancel" onClick={()=>setPopup(null)}>닫기</button>
                    <button className="modal-ok" onClick={()=>{setPopup(null);onEditEst(popup.id);}}>✏️ 견적서 수정</button>
                </div>
            </div>
        </div>)}

        <div className="page-header">
            <div className="page-title-wrap"><h1>📅 일정표</h1><p>견적 진행 일정 · 이벤트 클릭 시 견적서 열기</p></div>
            <div className="btn-row">
                <button className={`btn ${view==='biweek'?'btn-primary':'btn-outline'}`} onClick={()=>setView('biweek')}>2주간</button>
                <button className={`btn ${view==='month'?'btn-primary':'btn-outline'}`} onClick={()=>setView('month')}>월간</button>
                <button className="btn btn-outline" onClick={()=>setBase(new Date())}>오늘</button>
            </div>
        </div>

        <div className="cal-legend" style={{marginBottom:12}}>
            {Object.values(SCHED_MAP).map(info=>(<span key={info.label} className="cal-legend-item" style={{background:info.bg,color:info.color}}>● {info.label}</span>))}
            <span style={{fontSize:11,color:'var(--muted)',alignSelf:'center'}}>※ 가견적발송·설치완료 제외</span>
        </div>

        <div className="cal-header" style={{marginBottom:14}}>
            <div style={{display:'flex',alignItems:'center',gap:0,flex:1,justifyContent:'center'}}>
                <button className="cal-nav" style={{borderRadius:'8px 0 0 8px',borderRight:'none'}}
                    onClick={()=>{const d=new Date(base);view==='biweek'?d.setDate(d.getDate()-14):d.setMonth(d.getMonth()-1);setBase(d);}}>◀</button>
                <span className="cal-title" style={{padding:'0 20px',background:'#fff',border:'1.5px solid var(--border)',height:38,display:'flex',alignItems:'center',fontSize:16}}>
                    {view==='biweek'?(()=>{const d=new Date(base);const dow=d.getDay();d.setDate(d.getDate()-(dow===0?6:dow-1));const e=new Date(d);e.setDate(d.getDate()+13);return d.toLocaleDateString('ko-KR',{month:'long',day:'numeric'})+' ~ '+e.toLocaleDateString('ko-KR',{month:'long',day:'numeric'});})():base.getFullYear()+'년 '+(base.getMonth()+1)+'월'}
                </span>
                <button className="cal-nav" style={{borderRadius:'0 8px 8px 0',borderLeft:'none'}}
                    onClick={()=>{const d=new Date(base);view==='biweek'?d.setDate(d.getDate()+14):d.setMonth(d.getMonth()+1);setBase(d);}}>▶</button>
            </div>
        </div>
        {view==='biweek'?renderBiweek():renderMonth()}
    </div>);
}

/* ═══════════════════════════════════════
   ★ 사이드바
═══════════════════════════════════════ */
function Sidebar({user,page,setPage,matCats,prodCats,onAddMatCat,onDelMatCat,onAddProdCat,onDelProdCat,activeCatId,setActiveCatId,grandWithVat,onLogout,sbOpen,onClose}){
    const[open,setOpen]=useState(()=>page.startsWith('mat')?'material':page.startsWith('prod')?'product':page.startsWith('port')?'portfolio':page.startsWith('sched')?'schedule':'estimate');
    const[openSub,setOpenSub]=useState({mat:true,prod:true});
    const toggle=id=>setOpen(o=>o===id?null:id);
    const toggleSub=key=>setOpenSub(p=>({...p,[key]:!p[key]}));
    const uname=user?.user_metadata?.full_name||user?.email?.split('@')[0]||'사용자';
    const avatar=user?.user_metadata?.avatar_url;
    const activeGroup=page.startsWith('mat')?'material':page.startsWith('prod')?'product':page.startsWith('port')?'portfolio':page.startsWith('sched')?'schedule':'estimate';
    const goMat=(catId=null)=>{setPage('mat-list');setActiveCatId({mat:catId,prod:null});if(onClose)onClose();};
    const goProd=(catId=null)=>{setPage('prod-list');setActiveCatId({mat:null,prod:catId});if(onClose)onClose();};
    const go=p=>{setPage(p);if(onClose)onClose();};

    const SI=({label,isActive,onNav})=>(<div className={`nav-sub-item ${isActive?'active':''}`} onClick={onNav}><span className="nav-sub-dot"/><span className="nav-sub-label">{label}</span></div>);
    const SSI=({label,isActive,onNav,onDel})=>(<div className={`ssi ${isActive?'active':''}`} onClick={onNav}><span className="ssi-dot"/><span className="ssi-label">{label}</span>{onDel&&<button className="ssi-del" onClick={e=>{e.stopPropagation();onDel();}}>✕</button>}</div>);

    return(<aside className={`sidebar ${sbOpen?'sb-open':''}`} onClick={e=>e.stopPropagation()}>
        <div className="sb-header"><div className="sb-logo">LUCKY<span>STAR</span></div><div className="sb-sub">CARAVAN MANAGER v2.0</div></div>
        <div className="sb-user">
            <div className="sb-avatar">{avatar?<img src={avatar} alt=""/>:uname[0]?.toUpperCase()}</div>
            <div className="sb-username">{uname}</div>
            <button className="sb-logout" onClick={onLogout} title="로그아웃">⏻</button>
        </div>
        <nav className="sb-nav">
            <div className={`nav-row ${activeGroup==='material'?'active':''} ${open==='material'?'open':''}`}>
                <div className="nav-label" onClick={()=>toggle('material')}><span className="nav-icon">📦</span>자재관리<span className="nav-arrow">▶</span></div>
            </div>
            <div className={`nav-sub ${open==='material'?'open':''}`}>
                <div className={`nav-grp-hd ${openSub.mat?'open':''}`} onClick={()=>toggleSub('mat')}>
                    <span>📁 자재분류</span>
                    <button style={{background:'none',border:'none',color:'rgba(255,255,255,.35)',cursor:'pointer',fontSize:14,lineHeight:1,padding:'0 6px'}} onClick={e=>{e.stopPropagation();onAddMatCat();}}>＋</button>
                    <span className="nav-grp-arrow">▶</span>
                </div>
                <div className={`nav-sub-sub ${openSub.mat?'open':''}`}>
                    <SSI label="전체 자재" isActive={page==='mat-list'&&activeCatId?.mat===null} onNav={()=>goMat(null)}/>
                    {matCats.map(c=><SSI key={c.id} label={c.name} isActive={page==='mat-list'&&activeCatId?.mat===c.id} onNav={()=>goMat(c.id)} onDel={()=>onDelMatCat(c.id)}/>)}
                    <div className="ssi-add" onClick={onAddMatCat}>＋ 분류 추가</div>
                </div>
                <SI label="🏭 재고 현황" isActive={page==='mat-stock'} onNav={()=>go('mat-stock')}/>
                <SI label="🏢 공급사 관리" isActive={page==='supplier-list'} onNav={()=>go('supplier-list')}/>
            </div>

            <div className={`nav-row ${activeGroup==='product'?'active':''} ${open==='product'?'open':''}`}>
                <div className="nav-label" onClick={()=>toggle('product')}><span className="nav-icon">🛍</span>상품관리<span className="nav-arrow">▶</span></div>
            </div>
            <div className={`nav-sub ${open==='product'?'open':''}`}>
                <div className={`nav-grp-hd ${openSub.prod?'open':''}`} onClick={()=>toggleSub('prod')}>
                    <span>📁 상품분류</span>
                    <button style={{background:'none',border:'none',color:'rgba(255,255,255,.35)',cursor:'pointer',fontSize:14,lineHeight:1,padding:'0 6px'}} onClick={e=>{e.stopPropagation();onAddProdCat();}}>＋</button>
                    <span className="nav-grp-arrow">▶</span>
                </div>
                <div className={`nav-sub-sub ${openSub.prod?'open':''}`}>
                    <SSI label="전체 상품" isActive={page==='prod-list'&&activeCatId?.prod===null} onNav={()=>goProd(null)}/>
                    {prodCats.map(c=><SSI key={c.id} label={c.name} isActive={page==='prod-list'&&activeCatId?.prod===c.id} onNav={()=>goProd(c.id)} onDel={()=>onDelProdCat(c.id)}/>)}
                    <div className="ssi-add" onClick={onAddProdCat}>＋ 카테고리 추가</div>
                </div>
            </div>

            <div className={`nav-row ${activeGroup==='portfolio'?'active':''} ${open==='portfolio'?'open':''}`}>
                <div className="nav-label" onClick={()=>toggle('portfolio')}><span className="nav-icon">🖼</span>포트폴리오<span className="nav-arrow">▶</span></div>
            </div>
            <div className={`nav-sub ${open==='portfolio'?'open':''}`}>
                <SI label="포트폴리오 관리" isActive={page==='portfolio'} onNav={()=>go('portfolio')}/>
            </div>

            <div className={`nav-row ${activeGroup==='estimate'?'active':''} ${open==='estimate'?'open':''}`}>
                <div className="nav-label" onClick={()=>toggle('estimate')}><span className="nav-icon">📋</span>견적관리<span className="nav-arrow">▶</span></div>
            </div>
            <div className={`nav-sub ${open==='estimate'?'open':''}`}>
                <SI label="새 견적서" isActive={page==='est-new'} onNav={()=>go('est-new')}/>
                <SI label="견적 목록" isActive={page==='est-list'} onNav={()=>go('est-list')}/>
            </div>

            <div className={`nav-row ${activeGroup==='schedule'?'active':''} ${open==='schedule'?'open':''}`}>
                <div className="nav-label" onClick={()=>toggle('schedule')}><span className="nav-icon">📅</span>일정표<span className="nav-arrow">▶</span></div>
            </div>
            <div className={`nav-sub ${open==='schedule'?'open':''}`}>
                <SI label="2주간 일정" isActive={page==='sched-biweek'} onNav={()=>go('sched-biweek')}/>
                <SI label="월간 일정" isActive={page==='sched-month'} onNav={()=>go('sched-month')}/>
            </div>
            {/* 관리자 전용 메뉴 */}
            {user?.email===ADMIN_EMAIL&&(
                <div className={`nav-row ${page==='user-approval'?'active':''}`} style={{marginTop:8}}>
                    <div className="nav-label" onClick={()=>go('user-approval')}>
                        <span className="nav-icon">⚙️</span>사용자 관리
                    </div>
                </div>
            )}
        </nav>
        <div className="sb-footer">
            <div className="sb-total-label">총 견적 (VAT포함)</div>
            <div className="sb-total-val">{fmt(grandWithVat)}원</div>
            <div className="sb-status"><span className="dot-green"/>클라우드 연결됨</div>
        </div>
    </aside>);
}

/* ═══════════════════════════════════════
   ★ 앱
═══════════════════════════════════════ */
function App(){
    const[config,setConfig]=useState(()=>{
        const SUPABASE_URL='https://ubxoyogkygwzdlmfrtfn.supabase.co';
        const SUPABASE_KEY='sb_publishable_vKyoKH8lAH5m4zZu5fYn_w_aUjVVSV2';
        if(SUPABASE_URL&&SUPABASE_KEY)return{url:SUPABASE_URL,key:SUPABASE_KEY};
        try{return JSON.parse(localStorage.getItem('supabase_config'));}catch{return null;}
    });
    const[sb,setSb]=useState(null);
    const[user,setUser]=useState(null);
    const[authLoading,setAuthLoading]=useState(true);
    const[isApproved,setIsApproved]=useState(false);
    const[page,setPage]=useState('sched-biweek'); // 첫 화면: 2주간 일정
    const[sbOpen,setSbOpen]=useState(false);
    const[editEstId,setEditEstId]=useState(null);
    const[matCats,setMatCats]=useState([]);
    const[prodCats,setProdCats]=useState([]);
    const[addMatModal,setAddMatModal]=useState(false);
    const[addProdModal,setAddProdModal]=useState(false);
    const[activeCatId,setActiveCatId]=useState({mat:null,prod:null});
    const[grandWithVat,setGrandWithVat]=useState(0);
    const[suppliers,setSuppliers]=useState([]); // 공급사 목록

    useEffect(()=>{
        if(!config)return setAuthLoading(false);
        const client=window.supabase.createClient(config.url,config.key);
        setSb(client);
        client.auth.getSession().then(async({data:{session}})=>{
            const u=session?.user??null;setUser(u);
            if(u){
                if(u.email===ADMIN_EMAIL){setIsApproved(true);}
                else{const{data}=await client.from('approved_users').select('email').eq('email',u.email).maybeSingle();setIsApproved(!!data);}
            }
            setAuthLoading(false);
        });
        client.auth.onAuthStateChange(async(_,session)=>{
            const u=session?.user??null;setUser(u);
            if(u){
                if(u.email===ADMIN_EMAIL){setIsApproved(true);}
                else{const{data}=await client.from('approved_users').select('email').eq('email',u.email).maybeSingle();setIsApproved(!!data);}
            }else{setIsApproved(false);}
        });
    },[config]);

    useEffect(()=>{
        if(!sb||!user)return;
        sb.from('material_categories').select('*').order('display_order').then(({data})=>{if(data)setMatCats(data);});
        sb.from('suppliers').select('*').order('name').then(({data})=>{if(data)setSuppliers(data);});
        sb.from('product_categories').select('*').order('display_order').then(({data})=>{if(data)setProdCats(data);});
    },[sb,user]);

    const navigate=(p,id)=>{if(id)setEditEstId(id);setPage(p);setSbOpen(false);};

    const addMatCat=async name=>{
        const{data}=await sb.from('material_categories').insert([{name,display_order:matCats.length}]).select();
        if(data)setMatCats(p=>[...p,data[0]]);
        setAddMatModal(false);toast('📁 자재분류 추가됨');
    };
    const delMatCat=async id=>{
        if(!confirm('분류를 삭제하시겠습니까?'))return;
        await sb.from('material_categories').delete().eq('id',id);
        setMatCats(p=>p.filter(c=>c.id!==id));toast('🗑 삭제됨');
    };
    const addProdCat=async name=>{
        const{data}=await sb.from('product_categories').insert([{name,display_order:prodCats.length}]).select();
        if(data)setProdCats(p=>[...p,data[0]]);
        setAddProdModal(false);toast('📁 카테고리 추가됨');
    };
    const delProdCat=async id=>{
        if(!confirm('카테고리를 삭제하시겠습니까?'))return;
        await sb.from('product_categories').delete().eq('id',id);
        setProdCats(p=>p.filter(c=>c.id!==id));toast('🗑 삭제됨');
    };
    const handleLogout=async()=>{if(sb)await sb.auth.signOut();setUser(null);};

    const renderPage=()=>{
        switch(page){
            case 'mat-list':return<MaterialList sb={sb} matCats={matCats} suppliers={suppliers} onAddMatCat={()=>setAddMatModal(true)} initialCatId={activeCatId.mat}/>;
            case 'supplier-list':return<SupplierList sb={sb} suppliers={suppliers} setSuppliers={setSuppliers}/>;
            case 'mat-stock':return<div><div className="page-header"><div className="page-title-wrap"><h1>🏭 재고 현황</h1><p>자재별 재고 조회</p></div></div><div className="coming-wrap" style={{marginTop:0}}><div className="coming-icon">🔨</div><div style={{fontSize:16,fontWeight:700,color:'var(--navy)'}}>준비 중</div></div></div>;
            case 'prod-list':return<ProductList sb={sb} matCats={matCats} prodCats={prodCats} onAddProdCat={()=>setAddProdModal(true)} initialCatId={activeCatId.prod}/>;
            case 'portfolio':return<Portfolio sb={sb} prodCats={prodCats}/>;
            case 'est-new':return<EstimateForm key="new" sb={sb} prodCats={prodCats} mode="new" onNavigate={navigate} onTotalChange={setGrandWithVat}/>;
            case 'est-list':return<EstimateList sb={sb} onEdit={id=>navigate('est-edit',id)} onNew={()=>navigate('est-new')}/>;
            case 'est-edit':return<EstimateForm key={editEstId} sb={sb} prodCats={prodCats} mode="edit" estimateId={editEstId} onNavigate={navigate} onTotalChange={setGrandWithVat}/>;
            case 'sched-biweek':return<Schedule sb={sb} onEditEst={id=>navigate('est-edit',id)}/>;
            case 'sched-month':return<Schedule sb={sb} onEditEst={id=>navigate('est-edit',id)}/>
;            case 'user-approval':return<UserApprovalPage sb={sb} user={user}/>;
            default:return<EstimateList sb={sb} onEdit={id=>navigate('est-edit',id)} onNew={()=>navigate('est-new')}/>;
        }
    };

    if(authLoading)return<div className="loading-wrap"><div className="loading-spinner"/></div>;
    if(!config)return<SetupScreen onDone={c=>{localStorage.setItem('supabase_config',JSON.stringify(c));setConfig(c);}}/>;
    if(!user)return<LoginScreen sb={sb}/>;
    if(!isApproved)return<AccessDenied user={user} sb={sb} onLogout={handleLogout} onApprove={()=>setIsApproved(true)}/>;

    return(<div className="layout">
        <div className="mobile-header">
            <button className="hamburger" onClick={()=>setSbOpen(o=>!o)}>☰</button>
            <div className="mobile-logo">LUCKY<span>STAR</span></div>
            <button style={{background:'none',border:'none',color:'rgba(255,255,255,.5)',cursor:'pointer',fontSize:13,fontFamily:'Noto Sans KR,sans-serif'}} onClick={handleLogout}>⏻</button>
        </div>
        <div className={`sb-overlay ${sbOpen?'active':''}`} onClick={()=>setSbOpen(false)}/>
        {addMatModal&&<AddNameModal title="자재 분류 추가" placeholder="분류명 입력" onClose={()=>setAddMatModal(false)} onAdd={addMatCat}/>}
        {addProdModal&&<AddNameModal title="상품 카테고리 추가" placeholder="카테고리명 입력" onClose={()=>setAddProdModal(false)} onAdd={addProdCat}/>}
        <Sidebar user={user} page={page} setPage={p=>{setPage(p);setSbOpen(false);}} matCats={matCats} prodCats={prodCats} onAddMatCat={()=>{setAddMatModal(true);setSbOpen(false);}} onDelMatCat={delMatCat} onAddProdCat={()=>{setAddProdModal(true);setSbOpen(false);}} onDelProdCat={delProdCat} activeCatId={activeCatId} setActiveCatId={setActiveCatId} grandWithVat={grandWithVat} onLogout={handleLogout} sbOpen={sbOpen} onClose={()=>setSbOpen(false)}/>
        <main className="main">{renderPage()}</main>
    </div>);
}

const container=document.getElementById('root');
const root=ReactDOM.createRoot(container);
root.render(React.createElement(App));
</script>
</body>
</html>
