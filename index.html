        }
    };
    const del=async id=>{if(!confirm('삭제?'))return;await sb.from('materials').delete().eq('id',id);setMaterials(p=>p.filter(m=>m.id!==id));toast('🗑 삭제됨');};
    const catName=id=>matCats.find(c=>c.id===id)?.name||'미분류';

    // ★ 엑셀 내보내기
    const exportExcel=()=>{
        const headers=['품명','분류','규격/재질','두께','단가(원)','가공비(원)','재고수량','제조사','공급업체','기타구분','메모','구매링크'];
        const rows=materials.map(m=>[m.name||'',catName(m.category_id),m.specification||'',m.thickness||'',m.unit_price||0,m.processing_cost||0,m.stock_qty||0,m.manufacturer||'',m.supplier||'',m.category_extra||'',m.memo||'',m.purchase_link||'']);
        const wb=XLSX.utils.book_new();
        const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
        ws['!cols']=[{wch:22},{wch:12},{wch:16},{wch:8},{wch:10},{wch:10},{wch:8},{wch:14},{wch:14},{wch:12},{wch:18},{wch:30}];
        XLSX.utils.book_append_sheet(wb,ws,'자재목록');
        XLSX.writeFile(wb,'럭키스타_자재목록.xlsx');
        toast('📊 엑셀 저장됨');
    };

    // ★ 엑셀 가져오기 (업로드 후 수정/추가)
    const importExcel=async e=>{
        const file=e.target.files[0];if(!file)return;
        e.target.value='';
        setImporting(true);
        try{
            const ab=await file.arrayBuffer();
            const wb=XLSX.read(ab,{type:'array'});
            const ws=wb.Sheets[wb.SheetNames[0]];
            const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
            if(rows.length<2){alert('데이터가 없습니다.');return;}
            const hdr=rows[0];
            const col=k=>hdr.indexOf(k);
            let added=0,updated=0,errors=0;
            for(let i=1;i<rows.length;i++){
                const r=rows[i];
                const name=String(r[col('품명')]||'').trim();
                if(!name)continue;
                const catStr=String(r[col('분류')]||'').trim();
                const catObj=matCats.find(c=>c.name===catStr);
                const payload={
                    name,
                    category_id:catObj?catObj.id:null,
                    specification:String(r[col('규격/재질')]||''),
                    thickness:String(r[col('두께')]||''),
                    unit_price:Number(r[col('단가(원)')])||0,
                    processing_cost:Number(r[col('가공비(원)')])||0,
                    stock_qty:Number(r[col('재고수량')])||0,
                    manufacturer:String(r[col('제조사')]||''),
                    supplier:String(r[col('공급업체')]||''),
                    category_extra:String(r[col('기타구분')]||''),
                    memo:String(r[col('메모')]||''),
                    purchase_link:String(r[col('구매링크')]||''),
                };
                const existing=materials.find(m=>m.name===name);
                if(existing){
                    const{error}=await sb.from('materials').update(payload).eq('id',existing.id);
                    if(!error)updated++;else errors++;
                }else{
                    const{error}=await sb.from('materials').insert([payload]);
                    if(!error)added++;else errors++;
                }
            }
            // 다시 로드
            const{data}=await sb.from('materials').select('*').order('name',{ascending:true});
            if(data)setMaterials(data);
            alert(`가져오기 완료
추가: ${added}건  수정: ${updated}건${errors>0?' 오류: '+errors+'건':''}`);
        }catch(err){
            alert('오류: '+err.message);
        }finally{setImporting(false);}
    };

    // ★ 필터 + 검색 + 정렬(이름순)
    const filtered=materials
        .filter(m=>!activeCat||m.category_id===activeCat)
        .filter(m=>!search||m.name.toLowerCase().includes(search.toLowerCase())||
            (m.specification||'').toLowerCase().includes(search.toLowerCase())||
            (m.supplier||'').toLowerCase().includes(search.toLowerCase()));

    // ★ 발주서 출력
    const printOrder=(supName,items)=>{
        const sup=suppliers.find(s=>s.name===supName)||{};
        const rows=items.map(it=>`<tr>
            <td>${it.mat.name}</td>
            <td>${it.mat.specification||''}</td>
            <td>${it.mat.thickness||''}</td>
            <td style="text-align:right;font-weight:700">${it.qty}</td>
        </tr>`).join('');
        const html=`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>발주서-${supName}</title>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
        <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Noto Sans KR',sans-serif;padding:30px;color:#1e293b;font-size:13px;background:#fff;}
        h1{font-size:22px;font-weight:900;margin-bottom:4px;color:#0f1923;}
        .sub{font-size:12px;color:#64748b;margin-bottom:18px;}
        .info{background:#f4f6fa;border-radius:8px;padding:14px 18px;margin-bottom:18px;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
        .info-row{font-size:12px;color:#1e293b;}.info-label{font-weight:700;color:#475569;margin-right:8px;}
        table{width:100%;border-collapse:collapse;margin-bottom:16px;}
        thead{background:#0f1923;}
        th{color:#fff;padding:8px 10px;font-size:11px;letter-spacing:.5px;text-align:left;font-weight:700;}
        td{padding:8px 10px;border-bottom:1px solid #e2e8f0;font-size:12px;color:#1e293b;}
        .footer{text-align:center;font-size:11px;color:#94a3b8;margin-top:16px;border-top:1px solid #e2e8f0;padding-top:10px;}
        @media print{body{padding:15px;}}
        </style></head><body>
        <h1>발주서 (PURCHASE ORDER)</h1>
        <div class="sub">발주일: ${new Date().toLocaleDateString('ko-KR')} &nbsp;|&nbsp; 럭키스타 캠핑카라반</div>
        <div class="info">
            <div class="info-row"><span class="info-label">공급업체</span>${supName}</div>
            <div class="info-row"><span class="info-label">사업자번호</span>${sup.business_no||'-'}</div>
            <div class="info-row"><span class="info-label">담당자</span>${sup.contact_person||'-'}</div>
            <div class="info-row"><span class="info-label">연락처</span>${sup.phone||'-'}</div>
            <div class="info-row"><span class="info-label">주소</span>${sup.address||'-'}</div>
            <div class="info-row"><span class="info-label">발주처</span>${sup.order_to||'-'}</div>
        </div>
        <table>
            <thead><tr><th>품명</th><th>규격/재질</th><th>두께</th><th style="text-align:right">발주수량</th></tr></thead>
            <tbody>${rows}</tbody>
        </table>
        <div class="footer">★ 럭키스타 캠핑카라반 | 경기도 파주시 광탄면</div>
        <script>window.onload=()=>{window.print();}<\/script></body></html>`;
        const w=window.open('','_blank','width=800,height=600');
        if(w){w.document.write(html);w.document.close();}
    };

    // ★ 발주 완료 처리
    const completeOrder=async(supName)=>{
        if(!confirm(`[${supName}] 발주 완료 처리하시겠습니까?
재고 수량이 발주 수량만큼 증가합니다.`))return;
        const items=orderCart.filter(it=>it.mat.supplier===supName);
        for(const it of items){
            const newQty=(it.mat.stock_qty||0)+it.qty;
            await sb.from('materials').update({stock_qty:newQty}).eq('id',it.mat.id);
            setMaterials(p=>p.map(m=>m.id===it.mat.id?{...m,stock_qty:newQty}:m));
        }
        setOrderCart(p=>p.filter(it=>it.mat.supplier!==supName));
        toast('✅ 발주 완료 — 재고 반영됨');
    };

    if(loading)return<div className="loading-wrap"><div className="loading-spinner"/></div>;
    return(<div>
        {showModal&&<MaterialModal sb={sb} matCats={matCats} suppliers={suppliers||[]} initial={editing} onClose={()=>{setShowModal(false);setEditing(null);}} onSave={save}/>}
        <div className="page-header">
            <div className="page-title-wrap"><h1>📦 자재 관리</h1><p>자재 등록 · 단가 · 재고 · 이름순 정렬</p></div>
            <div className="btn-row">
                <button className="btn btn-outline" onClick={onAddMatCat}>＋ 분류 추가</button>
                <button className="btn btn-outline" onClick={exportExcel}>📊 엑셀 저장</button>
                <label className={`btn btn-outline ${importing?'disabled':''}`} style={{cursor:'pointer'}}>
                    {importing?'⏳ 가져오는 중...':'📥 엑셀 가져오기'}
                    <input type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={importExcel} disabled={importing}/>
                </label>
                <button className="btn btn-primary" onClick={()=>{setEditing(null);setShowModal(true);}}>＋ 자재 등록</button>
                {orderCart.length>0&&<div className="cart-badge">
                    <button className="btn btn-gold" onClick={()=>setShowOrderForm(true)}>📋 발주서 ({orderCart.length})</button>
                    <span className="cart-count">{orderCart.length}</span>
                </div>}
            </div>
        </div>
        {/* 카테고리 필터 */}
        <div className="cat-filter">
            <div className={`cat-tab ${!activeCat?'active':''}`} onClick={()=>setActiveCat(null)}>전체 <span className="cnt">{materials.length}</span></div>
            {matCats.map(c=><div key={c.id} className={`cat-tab ${activeCat===c.id?'active':''}`} onClick={()=>setActiveCat(c.id)}>{c.name} <span className="cnt">{materials.filter(m=>m.category_id===c.id).length}</span></div>)}
        </div>
        {/* 검색 */}
        <div style={{marginBottom:14}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 품명 · 규격 · 공급업체 검색..."
                style={{width:'100%',padding:'9px 14px',border:'1.5px solid var(--border)',borderRadius:8,fontSize:13,fontFamily:'Noto Sans KR,sans-serif',outline:'none'}}
                onFocus={e=>e.target.style.borderColor='var(--blue)'} onBlur={e=>e.target.style.borderColor='var(--border)'}/>
        </div>
        {/* ★ 수량입력 팝업 */}
        {showOrderQty&&(<div className="modal-overlay" onClick={()=>setShowOrderQty(null)}>
            <div className="modal-box sm" style={{maxWidth:320}} onClick={e=>e.stopPropagation()}>
                <div className="modal-header"><div className="modal-title">📋 발주서에 담기</div><button className="modal-close" onClick={()=>setShowOrderQty(null)}>✕</button></div>
                <div style={{padding:'8px 0 16px'}}>
                    <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>{showOrderQty.name}</div>
                    <div className="mf"><label className="ml">발주 수량</label>
                        <input type="number" className="mi" value={orderQtyVal} min="1" autoFocus
                            onChange={e=>setOrderQtyVal(Number(e.target.value)||1)}/>
                    </div>
                    <div style={{fontSize:12,color:'var(--muted)',marginTop:8}}>
                        단가: {fmt(showOrderQty.unit_price||0)}원 + 가공비: {fmt(showOrderQty.processing_cost||0)}원
                    </div>
                </div>
                <div className="modal-btns">
                    <button className="modal-cancel" onClick={()=>setShowOrderQty(null)}>취소</button>
                    <button className="modal-ok" onClick={()=>{
                        const exists=orderCart.find(x=>x.mat.id===showOrderQty.id);
                        if(exists){setOrderCart(p=>p.map(x=>x.mat.id===showOrderQty.id?{...x,qty:x.qty+orderQtyVal}:x));}
                        else{setOrderCart(p=>[...p,{mat:showOrderQty,qty:orderQtyVal}]);}
                        setShowOrderQty(null);toast('📋 발주서에 담겼습니다');
                    }}>담기</button>
                </div>
            </div>
        </div>)}

        {/* ★ 발주서 양식 */}
        {showOrderForm&&(<div className="modal-overlay" onClick={()=>setShowOrderForm(false)}>
            <div className="modal-box lg" style={{maxWidth:900,maxHeight:'90vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
                <div className="modal-header">
                    <div className="modal-title">📋 발주서</div>
                    <button className="modal-close" onClick={()=>setShowOrderForm(false)}>✕</button>
                </div>
                {orderCart.length===0?<div style={{textAlign:'center',padding:40,color:'var(--muted)'}}>발주서에 담긴 자재가 없습니다.</div>
                :(()=>{
                    // 업체별 그룹핑
                    const groups={};
                    orderCart.forEach(it=>{const k=it.mat.supplier||'공급업체 미지정';if(!groups[k])groups[k]=[];groups[k].push(it);});
                    return Object.entries(groups).map(([supName,items])=>{
                        const total=items.reduce((s,it)=>s+((it.mat.unit_price||0)+(it.mat.processing_cost||0))*it.qty,0);
                        const sup=suppliers.find(s=>s.name===supName);
                        return(<div key={supName} className="order-section">
                            <div className="order-section-header">
                                <div>
                                    <div className="order-supplier-name">🏢 {supName}</div>
                                    {sup&&<div className="order-supplier-meta">{sup.contact_person&&sup.contact_person+' '}{sup.phone&&'| '+sup.phone}{sup.order_to&&' | '+sup.order_to}</div>}
                                </div>
                                <div style={{display:'flex',gap:8}}>
                                    <button className="btn btn-sm" style={{background:'#f0a500',color:'#0f1923',border:'none',fontWeight:700}} onClick={()=>printOrder(supName,items)}>🖨 발주서 인쇄</button>
                                    <button className="btn btn-sm" style={{background:'var(--green)',color:'#fff',border:'none'}} onClick={()=>completeOrder(supName)}>✅ 발주 완료</button>
                                </div>
                            </div>
                            <div style={{overflowX:'auto'}}>
                            <table className="order-table" style={{minWidth:600}}>
                                <thead><tr>
                                    <th>품명</th><th>규격/재질</th><th>두께</th>
                                    <th className="tr">발주수량</th>
                                    <th className="tr">단가(원)</th><th className="tr">가공비(원)</th>
                                    <th className="tr">금액(원)</th><th style={{width:40}}></th>
                                </tr></thead>
                                <tbody>{items.map((it,i)=>(
                                    <tr key={i}>
                                        <td style={{fontWeight:700}}>{it.mat.name}</td>
                                        <td style={{fontSize:12,color:'var(--muted)'}}>{it.mat.specification||'-'}</td>
                                        <td style={{fontSize:12,color:'var(--muted)'}}>{it.mat.thickness||'-'}</td>
                                        <td className="tr">
                                            <input type="number" className="qty-input order-table" min="1" value={it.qty}
                                                onChange={e=>setOrderCart(p=>p.map((x,j)=>x.mat.id===it.mat.id?{...x,qty:Number(e.target.value)||1}:x))}/>
                                        </td>
                                        <td className="tr">{fmt(it.mat.unit_price||0)}</td>
                                        <td className="tr" style={{color:'var(--orange)'}}>{fmt(it.mat.processing_cost||0)}</td>
                                        <td className="tr" style={{fontWeight:700}}>{fmt(((it.mat.unit_price||0)+(it.mat.processing_cost||0))*it.qty)}</td>
                                        <td style={{textAlign:'center'}}>
                                            <button className="btn-icon" onClick={()=>setOrderCart(p=>p.filter(x=>x.mat.id!==it.mat.id))}>✕</button>
                                        </td>
                                    </tr>
                                ))}</tbody>
                            </table>
                            </div>
                            <div className="order-footer">
                                <span style={{fontSize:12,color:'var(--muted)'}}>{items.length}개 품목</span>
                                <div className="order-total">발주 합계: <span>{fmt(total)}원</span></div>
                            </div>
                        </div>);
                    });
                })()}
                <div className="modal-btns">
                    <button className="modal-cancel" onClick={()=>setOrderCart([])}>🗑 전체 비우기</button>
                    <button className="modal-ok" onClick={()=>setShowOrderForm(false)}>닫기</button>
                </div>
            </div>
        </div>)}

        {filtered.length===0?<div className="empty-state"><div className="empty-icon">📦</div><div className="empty-text">{search?'검색 결과가 없습니다.':'자재가 없습니다.'}</div></div>
        :<div className="table-wrap"><table style={{minWidth:900}}>
            <thead><tr>
                <th style={{width:50}}>사진</th>
                <th style={{textAlign:'left'}}>품명</th>
                <th style={{textAlign:'left'}}>분류</th>
                <th style={{textAlign:'left'}}>규격/재질</th>
                <th style={{textAlign:'left'}}>두께</th>
                <th className="tr">단가(원)</th>
                <th className="tr">가공비(원)</th>
                <th className="tr">재고</th>
                <th style={{textAlign:'left'}}>제조사</th>
                <th style={{textAlign:'left'}}>공급업체</th>
                <th style={{textAlign:'left'}}>기타구분</th>
                <th style={{textAlign:'center',width:70}}>링크</th>
                <th style={{textAlign:'center',width:70}}>관리</th>
            </tr></thead>
            <tbody>{filtered.map(m=>(
                <tr key={m.id}>
                    <td style={{textAlign:'center'}}>{m.image_url?<img src={m.image_url} style={{width:36,height:36,objectFit:'cover',borderRadius:5,border:'1px solid var(--border)'}} alt=""/>:<span style={{fontSize:18}}>📦</span>}</td>
                    <td style={{fontWeight:700}}>{m.name}</td>
                    <td style={{fontSize:12,color:'var(--muted)'}}>{catName(m.category_id)}</td>
                    <td style={{fontSize:12,color:'var(--muted)'}}>{m.specification||'-'}</td>
                    <td style={{fontSize:12,color:'var(--muted)'}}>{m.thickness||'-'}</td>
                    <td className="tr" style={{fontWeight:700}}>{fmt(m.unit_price||0)}</td>
                    <td className="tr" style={{color:'var(--orange)',fontWeight:700}}>{fmt(m.processing_cost||0)}</td>
                    <td className="tr" style={{color:(m.stock_qty||0)<=0?'var(--red)':'inherit',fontWeight:700}}>{m.stock_qty||0}</td>
                    <td style={{fontSize:12}}>{m.manufacturer||'-'}</td>
                    <td style={{fontSize:12}}>{m.supplier||'-'}</td>
                    <td style={{fontSize:12,color:'var(--muted)'}}>{m.category_extra||'-'}</td>
                    <td style={{textAlign:'center'}}>
                        {m.purchase_link?<a href={m.purchase_link} target="_blank" rel="noreferrer">
                            <button className="btn btn-outline btn-xs" style={{whiteSpace:'nowrap'}}>🔗 열기</button>
                        </a>:<span style={{fontSize:11,color:'var(--muted)'}}>-</span>}
                    </td>
                    <td style={{textAlign:'center',whiteSpace:'nowrap'}}>
                        <button className="btn btn-outline btn-xs" style={{marginBottom:3}} onClick={()=>{setShowOrderQty(m);setOrderQtyVal(1);}}>📋담기</button>
                        <br/>
                        <button className="btn-icon" onClick={()=>{setEditing(m);setShowModal(true);}}>✏️</button>
                        <button className="btn-icon" onClick={()=>del(m.id)}>🗑</button>
                    </td>
                </tr>
            ))}</tbody>
        </table></div>}
    </div>);
}

/* ═══════════════════════════════════════
   ★ 상품 관리
═══════════════════════════════════════ */
function ProductModal({sb,matCats,prodCats,initial,onClose,onSave}){
    const blank={category_id:'',name:'',description:'',price:0,image_url:''};
    const[form,setForm]=useState(initial?{...initial}:blank);
    const[mats,setMats]=useState([]);
    const[allMaterials,setAllMaterials]=useState([]); // category_id 포함
    const set=(k,v)=>setForm(p=>({...p,[k]:v}));

    useEffect(()=>{
        if(!sb)return;
        // ★ 순서 보장: 자재목록 먼저 로드 후 상품자재 로드 (분류 매칭)
        (async()=>{
            const{data:allMatsData}=await sb.from('materials')
                .select('id,name,specification,unit_price,category_id').order('name');
            if(allMatsData) setAllMaterials(allMatsData);

            if(!initial?.id) return;
            const{data:pmData}=await sb.from('product_materials')
                .select('*').eq('product_id',initial.id);
            if(pmData){
                setMats(pmData.map(m=>{
                    // material_id로 자재 분류 복원
                    const found=(allMatsData||[]).find(x=>x.id===m.material_id);
                    return{
                        _catId:found?.category_id||'',
                        material_id:m.material_id||'',
                        material_name:m.material_name||'',
                        unit_price:Number(m.unit_price)||0,
                        quantity:Number(m.quantity)||1,
                        total:Number(m.total)||0,
                    };
                }));
            }
        })();
    },[sb,initial?.id]);

    const addMat=()=>setMats(p=>[...p,{_catId:'',material_id:'',material_name:'',unit_price:0,quantity:1,total:0}]);
    const updMat=(i,k,v)=>setMats(p=>p.map((m,j)=>{if(j!==i)return m;const nm=k==='__batch__'?{...m,...v}:{...m,[k]:v};nm.total=(Number(nm.unit_price)||0)*(Number(nm.quantity)||1);return nm;}));
    const delMat=i=>setMats(p=>p.filter((_,j)=>j!==i));

    // ★ 저장 시 DB 전용 필드만 추출 (id, product_id 제외)
    const ok=()=>{
        if(!form.name.trim()){alert('상품명을 입력하세요');return;}
        const cleanMats=mats.filter(m=>m.material_name).map(m=>({
            material_id:m.material_id||null,
            material_name:m.material_name||'',
            unit_price:Number(m.unit_price)||0,
            unit:'개',
            quantity:Number(m.quantity)||1,
            total:(Number(m.unit_price)||0)*(Number(m.quantity)||1),
        }));
        onSave({form,mats:cleanMats});
    };

    return(<div className="modal-overlay" onClick={onClose}>
        <div className="modal-box lg" onClick={e=>e.stopPropagation()}>
            <div className="modal-header"><div className="modal-title">{initial?'상품 수정':'새 상품 등록'}</div><button className="modal-close" onClick={onClose}>✕</button></div>
            <div className="mf"><label className="ml">사진</label><ImgUpload sb={sb} folder="products" value={form.image_url} onChange={v=>set('image_url',v)}/></div>
            <div className="modal-grid">
                <div className="mf"><label className="ml">카테고리 *</label><select className="mi" value={form.category_id} onChange={e=>set('category_id',e.target.value)}><option value="">선택</option>{prodCats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
                <div className="mf"><label className="ml">상품명 *</label><input className="mi" value={form.name} onChange={e=>set('name',e.target.value)} placeholder="상품명 입력"/></div>
                <div className="mf"><label className="ml">설명</label><input className="mi" value={form.description||''} onChange={e=>set('description',e.target.value)} placeholder="상품 설명"/></div>
                <div className="mf"><label className="ml">판매가(원)</label><input className="mi" type="number" value={form.price} onChange={e=>set('price',Number(e.target.value))} min="0"/></div>
            </div>
            <div style={{marginTop:14}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                    <span style={{fontSize:11,fontWeight:700,color:'var(--muted)',letterSpacing:1,textTransform:'uppercase'}}>필요 자재</span>
                    <button className="btn btn-outline btn-sm" onClick={addMat}>＋ 자재 추가</button>
                </div>
                {/* 컬럼 헤더 */}
                {mats.length>0&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr 80px 36px',gap:6,marginBottom:4}}>
                    <span style={{fontSize:10,fontWeight:700,color:'var(--muted)',letterSpacing:1}}>자재 분류</span>
                    <span style={{fontSize:10,fontWeight:700,color:'var(--muted)',letterSpacing:1}}>자재 품명</span>
                    <span style={{fontSize:10,fontWeight:700,color:'var(--muted)',letterSpacing:1,textAlign:'center'}}>수량</span>
                    <span></span>
                </div>}
                {mats.map((m,i)=>(
                    <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 1fr 80px 36px',gap:6,marginBottom:6,alignItems:'center'}}>
                        {/* 1. 자재 분류 선택 */}
                        <select className="mi" style={{fontSize:12}} value={m._catId||''}
                            onChange={e=>updMat(i,'_catId',e.target.value)}>
                            <option value="">── 분류 선택 ──</option>
                            {matCats.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                        </select>
                        {/* 2. 자재 품명 (분류 선택 후 필터링 / 기존값 표시) */}
                        <select className="mi" style={{fontSize:12}} value={m.material_id||''}
                            onChange={e=>{
                                const mat=allMaterials.find(x=>x.id===e.target.value);
                                if(mat)updMat(i,'__batch__',{_catId:mat.category_id||'',material_id:mat.id,material_name:mat.name,unit_price:mat.unit_price||0});
                                else updMat(i,'material_id','');
                            }}>
                            <option value="">{m._catId?'── 품명 선택 ──':'← 분류 먼저 선택'}</option>
                            {/* 저장된 값이 현재 목록에 없을 때도 표시 */}
                            {m.material_id&&!allMaterials.filter(x=>x.category_id===m._catId).find(x=>x.id===m.material_id)&&
                                <option value={m.material_id}>{m.material_name} (저장됨)</option>}
                            {allMaterials.filter(mat=>!m._catId||mat.category_id===m._catId).map(mat=>(
                                <option key={mat.id} value={mat.id}>{mat.name}{mat.specification?' ('+mat.specification+')':''}</option>
                            ))}
                        </select>
                        {/* 3. 수량 */}
                        <input className="mi" type="number" value={m.quantity||1} min="1" style={{fontSize:12,textAlign:'right'}}
                            onChange={e=>updMat(i,'quantity',Number(e.target.value)||1)}/>
                        <button className="btn-icon" onClick={()=>delMat(i)}>🗑</button>
                    </div>
                ))}
                {mats.length===0&&<p style={{fontSize:12,color:'var(--muted)',margin:'8px 0'}}>자재 추가 버튼으로 필요 자재를 등록하세요.</p>}
            </div>
            <div className="modal-btns"><button className="modal-cancel" onClick={onClose}>취소</button><button className="modal-ok" onClick={ok}>저장</button></div>
        </div>
    </div>);
}

function ProductList({sb,matCats,prodCats,onAddProdCat,initialCatId}){
    const[products,setProducts]=useState([]);const[loading,setLoading]=useState(true);
    const[activeCat,setActiveCat]=useState(initialCatId||null);
    const[showModal,setShowModal]=useState(false);const[editing,setEditing]=useState(null);
    const[search,setSearch]=useState('');

    useEffect(()=>{
        if(!sb)return;
        sb.from('products').select('*').order('name',{ascending:true}).then(({data})=>{if(data)setProducts(data);setLoading(false);});
    },[sb]);

    const save=async({form,mats})=>{
        setShowModal(false);setEditing(null);
        // ★ 안전한 자재 데이터 (id/product_id 제외, DB필드만)
        const cleanRow=(m,pid)=>({
            product_id:pid,
            material_id:m.material_id||null,
            material_name:m.material_name||'',
            unit_price:Number(m.unit_price)||0,
            unit:'개',
            quantity:Number(m.quantity)||1,
            total:(Number(m.unit_price)||0)*(Number(m.quantity)||1),
        });
        if(editing){
            const{data,error:e1}=await sb.from('products').update(form).eq('id',editing.id).select();
            if(e1){toast('오류: '+e1.message);return;}
            if(data){
                await sb.from('product_materials').delete().eq('product_id',editing.id);
                const validMats=mats.filter(m=>m.material_name);
                if(validMats.length>0){
                    const{error:e2}=await sb.from('product_materials').insert(validMats.map(m=>cleanRow(m,editing.id)));
                    if(e2){alert('자재 저장 오류: '+e2.message+'\n\nSupabase SQL Editor에서 아래를 실행하세요:\nALTER TABLE product_materials DISABLE ROW LEVEL SECURITY;');return;}
                }
                setProducts(p=>p.map(x=>x.id===editing.id?data[0]:x));
            }
            toast('수정됨 (자재 '+mats.length+'종)');
        }else{
            const{data,error:e1}=await sb.from('products').insert([form]).select();
            if(e1){toast('오류: '+e1.message);return;}
            if(data){
                const pid=data[0].id;
                const validMats=mats.filter(m=>m.material_name);
                if(validMats.length>0){
                    const{error:e2}=await sb.from('product_materials').insert(validMats.map(m=>cleanRow(m,pid)));
                    if(e2){alert('자재 저장 오류: '+e2.message+'\n\nSupabase SQL Editor에서 아래를 실행하세요:\nALTER TABLE product_materials DISABLE ROW LEVEL SECURITY;');return;}
                }
                setProducts(p=>[...p,data[0]]);
            }
            toast('등록됨 (자재 '+mats.length+'종)');
        }
    };
    const del=async id=>{
        if(!confirm('삭제?'))return;
        await sb.from('product_materials').delete().eq('product_id',id);
        await sb.from('products').delete().eq('id',id);
        setProducts(p=>p.filter(x=>x.id!==id));toast('🗑 삭제됨');
    };

    const catName=id=>prodCats.find(c=>c.id===id)?.name||'미분류';
    const filtered=products
        .filter(p=>!activeCat||p.category_id===activeCat)
        .filter(p=>!search||p.name.toLowerCase().includes(search.toLowerCase())||
            (p.description||'').toLowerCase().includes(search.toLowerCase()));

    if(loading)return<div className="loading-wrap"><div className="loading-spinner"/></div>;
    return(<div>
        {showModal&&<ProductModal sb={sb} matCats={matCats} prodCats={prodCats} initial={editing} onClose={()=>{setShowModal(false);setEditing(null);}} onSave={save}/>}
        <div className="page-header">
            <div className="page-title-wrap"><h1>🛍 상품 관리</h1><p>카테고리별 상품 등록 · 필요 자재 연동</p></div>
            <div className="btn-row">
                <button className="btn btn-outline" onClick={onAddProdCat}>＋ 카테고리 추가</button>
                <button className="btn btn-primary" onClick={()=>{setEditing(null);setShowModal(true);}}>＋ 상품 등록</button>
            </div>
        </div>
        <div className="cat-filter">
            <div className={`cat-tab ${!activeCat?'active':''}`} onClick={()=>setActiveCat(null)}>전체 <span className="cnt">{products.length}</span></div>
            {prodCats.map(c=><div key={c.id} className={`cat-tab ${activeCat===c.id?'active':''}`} onClick={()=>setActiveCat(c.id)}>{c.name} <span className="cnt">{products.filter(p=>p.category_id===c.id).length}</span></div>)}
        </div>
        {/* 검색 */}
        <div style={{marginBottom:14}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 상품명 · 설명 검색..."
                style={{width:'100%',padding:'9px 14px',border:'1.5px solid var(--border)',borderRadius:8,fontSize:13,fontFamily:'Noto Sans KR,sans-serif',outline:'none'}}
                onFocus={e=>e.target.style.borderColor='var(--blue)'} onBlur={e=>e.target.style.borderColor='var(--border)'}/>
        </div>
        {filtered.length===0?<div className="empty-state"><div className="empty-icon">🛍</div><div className="empty-text">{search?'검색 결과가 없습니다.':'상품이 없습니다.'}</div></div>
        :<div className="prod-grid">
            {filtered.map(prod=>(
                <div key={prod.id} className="prod-card">
                    {prod.image_url?<img src={prod.image_url} className="prod-card-img" alt=""/>:<div className="prod-card-img" style={{background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:32,color:'#94a3b8'}}>🛍</div>}
                    <div className="prod-card-body">
                        <div className="prod-card-cat">{catName(prod.category_id)}</div>
                        <div className="prod-card-name">{prod.name}</div>
                        {prod.description&&<div className="prod-card-desc">{prod.description}</div>}
                        {prod.price>0&&<div className="prod-card-price">{fmt(prod.price)}원</div>}
                        <div className="prod-card-actions">
                            <button className="btn btn-outline btn-sm" onClick={()=>{setEditing(prod);setShowModal(true);}}>✏️ 수정</button>
                            <button className="btn btn-sm" style={{background:'#fee2e2',color:'var(--red)',border:'none'}} onClick={()=>del(prod.id)}>🗑</button>
                        </div>
                    </div>
                </div>
            ))}
        </div>}
    </div>);
}

function ProductPickModal({sb,prodCats,cats,onAddProduct,onClose}){
    const[products,setProducts]=useState([]);const[activeCat,setActiveCat]=useState(null);
    const[picked,setPicked]=useState([]);const[loading,setLoading]=useState(true);

    useEffect(()=>{
        if(!sb)return;
        sb.from('products').select('*').order('name',{ascending:true}).then(({data})=>{if(data)setProducts(data);setLoading(false);});
    },[sb]);

    const toggle=prod=>setPicked(p=>p.find(x=>x.id===prod.id)?p.filter(x=>x.id!==prod.id):[...p,prod]);
    const filtered=activeCat?products.filter(p=>p.category_id===activeCat):products;

    const confirm=()=>{
        if(picked.length===0){toast('상품을 선택하세요');return;}
        // 각 선택된 상품을 순서대로 추가
        picked.forEach(prod=>{
            const catName=prodCats.find(c=>c.id===prod.category_id)?.name||'상품';
            onAddProduct(prod,catName,null);
        });
        onClose();
        toast('✅ '+picked.length+'개 상품 추가됨');
    };

    return(<div className="modal-overlay" onClick={onClose}>
        <div className="modal-box lg" onClick={e=>e.stopPropagation()}>
            <div className="modal-header"><div className="modal-title">🛍 상품 선택</div><button className="modal-close" onClick={onClose}>✕</button></div>
            {loading?<div style={{textAlign:'center',padding:40}}>로딩 중...</div>
            :<>
                <div className="cat-filter" style={{marginBottom:12}}>
                    <div className={`cat-tab ${!activeCat?'active':''}`} onClick={()=>setActiveCat(null)}>전체 <span className="cnt">{products.length}</span></div>
                    {prodCats.map(c=><div key={c.id} className={`cat-tab ${activeCat===c.id?'active':''}`} onClick={()=>setActiveCat(c.id)}>{c.name}</div>)}
                </div>
                <div className="pick-prod-grid" style={{maxHeight:'50vh',overflowY:'auto'}}>
                    {filtered.map(prod=>(
                        <div key={prod.id} className={`pick-prod-card ${picked.find(x=>x.id===prod.id)?'selected':''}`} onClick={()=>toggle(prod)}>
                            {prod.image_url?<img src={prod.image_url} className="pick-prod-img" alt=""/>:<div className="pick-prod-img" style={{background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,color:'#94a3b8'}}>🛍</div>}
                            <div className="pick-prod-info">
                                {picked.find(x=>x.id===prod.id)&&<span style={{color:'var(--green)',marginRight:4}}>✅</span>}
                                <span style={{fontWeight:700}}>{prod.name}</span>
                                {prod.price>0&&<span style={{fontSize:11,color:'var(--muted)'}}> {fmt(prod.price)}원</span>}
                            </div>
                        </div>
                    ))}
                </div>
            </>}
            <div className="modal-btns"><button className="modal-cancel" onClick={onClose}>취소</button><button className="modal-ok" onClick={confirm}>{picked.length}개 상품 추가</button></div>
        </div>
    </div>);
}

/* ═══════════════════════════════════════
   ★ 소요자재 카드 (상품별 + 합산)
═══════════════════════════════════════ */
function SoyoJaeCard({estMaterials, setEstMaterials, uid}){
    // 상품별 그룹 (itemName 있는 것)
    const byItem = {};
    estMaterials.forEach(m => {
        if(!m.itemName) return;
        if(!byItem[m.itemName]) byItem[m.itemName] = [];
        byItem[m.itemName].push(m);
    });
    const itemGroups = Object.entries(byItem);

    // 합산 (material_id 또는 name 기준)
    const sumMap = {};
    estMaterials.forEach(m => {
        const key = m.material_id || m.name;
        if(!key) return;
        if(!sumMap[key]) sumMap[key] = {id:m.id, name:m.name, material_id:m.material_id, unit_price:m.unit_price||0, qty:0};
        sumMap[key].qty += Number(m.qty) || 0;
    });
    const sumList = Object.values(sumMap).filter(m => m.qty > 0);

    const removeByKey = key => setEstMaterials(p => p.filter(x => (x.material_id || x.name) !== key));
    const addBlank = () => setEstMaterials(p => [...p, {id:uid(), name:'', qty:1, unit_price:0, material_id:null}]);

    // ★ 합산수량 직접 편집: 해당 자재의 모든 항목을 하나로 통합
    const updateSumQty = (key, newQty) => {
        setEstMaterials(prev => {
            const sample = prev.find(x => (x.material_id || x.name) === key);
            if(!sample) return prev;
            const filtered = prev.filter(x => (x.material_id || x.name) !== key);
            if(newQty > 0) filtered.push({id:uid(), name:sample.name, material_id:sample.material_id||null, unit_price:sample.unit_price||0, qty:newQty});
            return filtered;
        });
    };

    return(
        <div className="card">
            <div className="card-title">🔧 소요 자재
                <span style={{fontSize:11,color:'var(--muted)',fontWeight:400,marginLeft:6}}>(고객 인쇄 미포함 · 설치완료 시 재고 차감)</span>
            </div>

            {/* ① 상품별 필요자재 - itemName 있을 때만 표시 */}
            {itemGroups.length > 0 && (
                <div style={{marginBottom:14}}>
                    <div style={{fontSize:10,fontWeight:700,color:'var(--muted)',letterSpacing:1.5,textTransform:'uppercase',marginBottom:10}}>상품별 필요자재</div>
                    {itemGroups.map(([itemName, mats]) => (
                        <div key={itemName} style={{marginBottom:10}}>
                            <div style={{fontSize:12,fontWeight:800,color:'var(--navy)',marginBottom:5}}>📦 {itemName}</div>
                            <div style={{display:'flex',flexWrap:'wrap',gap:5,paddingLeft:16}}>
                                {mats.map((m, i) => (
                                    <span key={i} style={{fontSize:11,background:'#e0f2fe',color:'#0369a1',padding:'3px 10px',borderRadius:12,fontWeight:600}}>
                                        {m.name} <strong style={{fontFamily:'Bebas Neue,sans-serif',fontSize:13,color:'var(--navy)'}}>× {m.qty}</strong>
                                    </span>
                                ))}
                            </div>
                        </div>
                    ))}
                    <div style={{borderTop:'1.5px dashed var(--border)',margin:'4px 0 12px'}}/>
                </div>
            )}

            {/* ② 합산 소요자재 */}
            <div style={{fontSize:10,fontWeight:700,color:'var(--muted)',letterSpacing:1.5,textTransform:'uppercase',marginBottom:8}}>
                {itemGroups.length > 0 ? '합산 소요자재' : '소요자재'}
            </div>
            {sumList.length === 0
                ? <p style={{fontSize:12,color:'var(--muted)',marginBottom:10}}>상품 추가 시 자재가 자동으로 포함됩니다.</p>
                : <div className="table-wrap" style={{marginBottom:10}}>
                    <table style={{minWidth:340}}>
                        <thead>
                            <tr>
                                <th style={{textAlign:'left'}}>자재명</th>
                                <th className="tr" style={{width:100}}>합산수량</th>
                                <th style={{width:36}}></th>
                            </tr>
                        </thead>
                        <tbody>
                            {sumList.map((m, i) => (
                                <tr key={i}>
                                    <td style={{fontWeight:700}}>{m.name || '(자재명 없음)'}</td>
                                    <td className="tr" style={{padding:'4px 8px'}}>
                                        <input type="number" min="0" value={m.qty}
                                            style={{width:70,padding:'5px 8px',border:'1.5px solid var(--border)',borderRadius:6,fontSize:15,fontWeight:900,fontFamily:'Bebas Neue,sans-serif',textAlign:'right',color:'var(--navy)',letterSpacing:1}}
                                            onChange={e=>updateSumQty(m.material_id||m.name, Number(e.target.value)||0)}
                                            onFocus={e=>e.target.style.borderColor='var(--blue)'}
                                            onBlur={e=>e.target.style.borderColor='var(--border)'}/>
                                    </td>
                                    <td style={{textAlign:'center'}}>
                                        <button className="btn-icon" onClick={() => removeByKey(m.material_id || m.name)}>✕</button>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>}
            <button className="btn btn-outline btn-sm" onClick={addBlank}>＋ 자재 직접 추가</button>
        </div>
    );
}

function EstimateForm({sb,prodCats,mode,estimateId,onNavigate,onTotalChange}){
    const[cats,setCats]=useState([]);  // {id,name,order}  — new: uid(), edit: DB uuid
    const[items,setItems]=useState([]); // {id,catId,name,spec,qty,unitPrice,laborCost,total,imgUrl}
    const[client,setClient]=useState({});
    const[statusDates,setStatusDates]=useState({});
    const[currentStatus,setCurrentStatus]=useState('가견적발송');
    const[loading,setLoading]=useState(mode==='edit');
    const[saving,setSaving]=useState(false);
    const[showPick,setShowPick]=useState(false);
    const[estNo]=useState(()=>mode==='new'?genEstNo():'');
    // ★ 현장사진 & 결제 정보
    const[sitePhotos,setSitePhotos]=useState([]);
    const[paymentStatus,setPaymentStatus]=useState('입금전');
    const[depositAmount,setDepositAmount]=useState('');
    const[midAmount,setMidAmount]=useState('');
    const[balancePaid,setBalancePaid]=useState(false);
    const[statusChecked,setStatusChecked]=useState({}); // 진행상태 완료체크
    const[portItems,setPortItems]=useState([]);   // 첨부 포트폴리오
    const[estMaterials,setEstMaterials]=useState([]); // 소요 자재
    const[showPortPick,setShowPortPick]=useState(false);

    // ★ 신규 견적 시 담당자 자동 설정
    useEffect(()=>{
        if(mode!=='new'||!sb)return;

            if(user){
                const name=user.user_metadata?.full_name||user.email?.split('@')[0]||'';

            }
        });

        (async()=>{

                    }]).select();
                    if(e2) throw new Error('[est_cats] '+e2.message);
                    if(!cd||!cd[0]) throw new Error('카테고리 데이터가 반환되지 않았습니다');
                    cidMap[cats[i].id]=cd[0].id;
                }

                // ── 3. 품목 저장 ──
                const irows=items.filter(i=>cidMap[i.catId]).map(i=>({
                    cat_id:cidMap[i.catId],name:i.name,specification:i.spec||'',
                    quantity:Number(i.qty)||1,unit_price:Number(i.unitPrice)||0,
                    labor_cost:Number(i.laborCost)||0,total_amount:Number(i.total)||0,
                    image_url:i.imgUrl||''
                }));
                if(irows.length>0){
                    const{error:e3}=await sb.from('est_items').insert(irows);
                    if(e3) throw new Error('[est_items] '+e3.message);
                }
                toast('✅ 견적서가 저장되었습니다');
                onNavigate('est-list');
            } else {
                // ── 수정 저장 ──
                const{error:e4}=await sb.from('estimates').update({
                    client_name:client.name||'',client_phone:client.phone||'',
                    client_address:client.address||'',client_model:client.model||'',
                    client_caravan:client.caravan||'',client_manager:client.manager||'',
                    status:currentStatus,
                    status_dates:JSON.stringify(statusDates),
                    total_supply:grand,total_vat:vat,total_amount:grandVat,
                    site_photos:JSON.stringify(sitePhotos),
                    payment_status:paymentStatus,
                    deposit_amount:depositNum,
                    mid_amount:midNum,
                    balance_amount:balanceAmount,
                    balance_paid:balancePaid,
                    status_checked:JSON.stringify(statusChecked),
                    portfolio_items:JSON.stringify(portItems),
                    est_materials:JSON.stringify(estMaterials),
                    updated_at:now
                }).eq('id',estimateId);
                if(e4) throw new Error('[estimates update] '+e4.message);
                toast('✅ 견적서가 수정되었습니다');
                onNavigate('est-list');
            }
        }catch(e){
            const msg=e.message||String(e);
            console.error('저장 실패:', msg);
            // RLS 오류 안내
            if(msg.includes('row-level security')||msg.includes('policy')||msg.includes('42501')){
                alert('⚠️ 저장 실패: Supabase RLS(보안 정책) 오류\n\n아래 SQL을 Supabase SQL Editor에서 실행하세요:\n\nALTER TABLE estimates DISABLE ROW LEVEL SECURITY;\nALTER TABLE est_cats DISABLE ROW LEVEL SECURITY;\nALTER TABLE est_items DISABLE ROW LEVEL SECURITY;');
            } else if(msg.includes('relation')||msg.includes('does not exist')||msg.includes('42P01')){
                alert('⚠️ 저장 실패: 테이블이 없습니다\n\n채팅 아래쪽에 안내된 SQL 3개를 Supabase SQL Editor에서 먼저 실행하세요.');
            } else {
                alert('⚠️ 저장 실패\n\n오류 내용: '+msg+'\n\n브라우저 콘솔(F12)에서 자세한 내용을 확인하세요.');
            }
        }finally{setSaving(false);}
    };

    // Excel
    const exportExcel=()=>{const wb=XLSX.utils.book_new();const en=mode==='new'?estNo:client.name||'견적';const rows=[['럭키스타 캠핑카라반 견적서'],[`고객: ${client.name||''}`,`연락처: ${client.phone||''}`],[`상태: ${currentStatus}`],[],['카테고리','품목명','규격','수량','단가','노무비','합계']];cats.forEach(cat=>items.filter(i=>i.catId===cat.id).forEach(item=>rows.push([cat.name,item.name,item.spec||'',item.qty,item.unitPrice,item.laborCost,item.total])));rows.push([],[``,``,``,``,`자재비`,``,totalMat],[``,``,``,``,`노무비`,``,totalLab],[``,``,``,``,`공급가액`,``,grand],[``,``,``,``,`VAT`,``,vat],[``,``,``,``,`합계(VAT포함)`,``,grandVat]);const ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:14},{wch:22},{wch:18},{wch:7},{wch:13},{wch:13},{wch:15}];XLSX.utils.book_append_sheet(wb,ws,'견적서');XLSX.writeFile(wb,`럭키스타_${en}.xlsx`);toast('📊 엑셀 저장됨');};

    if(loading)return<div className="loading-wrap"><div className="loading-spinner"/></div>;

    return(<div>
        {showPick&&<ProductPickModal sb={sb} prodCats={prodCats} cats={cats} onAddProduct={addProductToEst} onClose={()=>setShowPick(false)}/>}
        <div className="page-header">
            <div className="page-title-wrap"><h1>{mode==='new'?'📋 새 견적서 작성':'✏️ 견적서 수정'}</h1><p>{mode==='new'?'상품 선택 또는 직접 입력 · 작성 완료 후 저장 버튼을 눌러주세요':'항목 수정은 실시간 저장 · 저장 버튼으로 마무리'}</p></div>
            <div className="btn-row no-print">
                <button className="btn btn-outline" onClick={()=>onNavigate('est-list')}>← 목록으로</button>
                <button className="btn btn-green" onClick={()=>setShowPick(true)}>🛍 상품 선택</button>
                <button className="btn btn-gold" onClick={exportExcel}>📊 엑셀</button>
                <button className="btn btn-outline" onClick={printEstimate}>🖨 인쇄</button>
                <button className="btn btn-outline" style={{fontSize:11,padding:'6px 10px',color:'var(--muted)'}} onClick={showSqlGuide}>⚙️ DB 안내</button>
                <button className="btn btn-primary" onClick={save} disabled={saving}>{saving?'저장 중...':'💾 저장'}</button>
            </div>
        </div>

        {/* 견적 배지 */}
        <div className="est-badge">
            {[['견적번호',<span className="est-badge-num">{mode==='new'?estNo:estimateId?.substr(0,8).toUpperCase()}</span>],['작성일',<span style={{color:'#fff',fontSize:14,fontWeight:600}}>{new Date().toLocaleDateString('ko-KR')}</span>],['상태',<StatusBadge status={currentStatus}/>]].map(([l,v],i)=><React.Fragment key={l}>{i>0&&<div className="est-badge-sep"/>}<div><div className="est-badge-label">{l}</div>{v}</div></React.Fragment>)}
        </div>

        {/* ★ 수정 모드: 진행 상태 타임라인 */}
        {mode==='edit'&&(
            <div className="status-timeline-card">
                <div className="status-timeline-title" style={{color:'var(--navy)'}}>📊 진행 상태 관리</div>
                {STATUS_LIST.map(s=>{
                    const hasDate=!!statusDates[s];
                    const isChecked=!!statusChecked[s];
                    const isCurrent=currentStatus===s;
                    const isDone=STATUS_LIST.indexOf(s)<STATUS_LIST.indexOf(currentStatus)||hasDate||isChecked;
                    const cls=isChecked?'done':isCurrent?'current':isDone?'done':'pending';
                    return(
                        <div key={s} className={`status-row ${isChecked?'status-check-done':''}`}>
                            <div className={`status-row-icon ${cls}`}>{STATUS_ICON[s]}</div>
                            <div className="status-row-info">
                                <div className={`status-row-label ${cls}`}>{s}
                                    {isCurrent&&!isChecked&&<span style={{fontSize:10,marginLeft:6,background:STATUS_BG[s],color:STATUS_COLOR[s],padding:'1px 8px',borderRadius:10}}>현재</span>}
                                    {isChecked&&<span style={{fontSize:10,marginLeft:6,background:'#dcfce7',color:'#16a34a',padding:'1px 8px',borderRadius:10}}>완료</span>}
                                </div>
                                {statusDates[s]&&<div className="status-row-time">{new Date(statusDates[s]).toLocaleString('ko-KR')}</div>}
                            </div>
                            {/* 날짜/시간 입력 */}
                            <div>
                                <input type="datetime-local" className={`status-dt-input ${statusDates[s]?'has-value':''}`}
                                    value={statusDates[s]?statusDates[s].slice(0,16):''}
                                    onChange={e=>updStatusDate(s,e.target.value)}
                                    title={s+' 날짜/시간'}/>
                            </div>
                            {/* 완료 체크박스 */}
                            <div style={{display:'flex',alignItems:'center',gap:5}}>
                                <input type="checkbox" className="status-check"
                                    checked={isChecked}
                                    onChange={e=>updStatusChecked(s,e.target.checked)}
                                    title="완료"/>
                                <span style={{fontSize:10,color:'var(--muted)',whiteSpace:'nowrap'}}>완료</span>
                            </div>
                        </div>
                    );
                })}
            </div>
        )}

        {/* 고객 정보 */}
        <div className="card"><div className="card-title">고객 정보</div>
            <div className="info-grid">{[['name','고객명','홍길동'],['phone','연락처','010-0000-0000'],['address','주소/지역','경기도 파주시'],['manager','담당자','담당자명']].map(([k,l,p])=>(
                    <div className="info-field" key={k}>
                        <label>{l}</label>
                        <div style={{display:'flex',gap:5,alignItems:'center'}}>
                            <input style={{flex:1}} value={client[k]||''} onChange={e=>updClient(k,e.target.value)} placeholder={p}/>
                            {k==='address'&&client.address&&(
                                <div style={{display:'flex',gap:4,flexShrink:0}}>
                                    <button className="nav-btn" title="T맵으로 길안내"
                                        onClick={()=>{const a=encodeURIComponent(client.address||'');window.open(`https://tmap.life/${a}`,'_blank');}}>🗺T맵</button>
                                    <button className="nav-btn" style={{background:'var(--green)'}} title="카카오맵으로 길안내"
                                        onClick={()=>{const a=encodeURIComponent(client.address||'');window.open(`https://map.kakao.com/?q=${a}`,'_blank');}}>🗺카카오</button>
                                </div>
                            )}
                        </div>
                    </div>
            ))}</div>
        </div>

        {/* 카테고리 버튼 */}
        <div style={{marginBottom:12,display:'flex',gap:8,flexWrap:'wrap'}} className="no-print">
            <button className="btn btn-outline btn-sm" onClick={addCat}>＋ 기타상품추가</button>
        </div>

        {/* 품목 테이블 */}
        {cats.length===0&&<div className="empty-state" style={{marginTop:20}}><div className="empty-icon">📋</div><div className="empty-text"><strong style={{color:'var(--blue)'}}>🛍 상품 선택</strong> 또는 <strong>기타상품추가</strong>로 시작하세요.</div></div>}
        {cats.map(cat=>{const ci=items.filter(i=>i.catId===cat.id);const sub=catTotal(cat.id);return(
            <div key={cat.id} className="cat-section">
                <div className="cat-header"><div className="cat-header-left"><div className="cat-bar"/><input className="cat-name-input" value={cat.name} onChange={e=>updCat(cat.id,e.target.value)}/><span className="cat-subtotal">소계 {fmt(sub)}원</span></div>
                <div style={{display:'flex',gap:8,alignItems:'center'}} className="no-print"><button className="btn btn-outline btn-sm" onClick={()=>addItem(cat.id)}>＋ 품목</button><button className="del-btn" onClick={()=>delCat(cat.id)}>🗑</button></div></div>
                <div className="table-wrap"><table>
                    <thead><tr><th className="tc" style={{width:52}}>사진</th><th style={{textAlign:'left',minWidth:130}}>품목/부품명</th><th style={{textAlign:'left',minWidth:100}}>규격/재질</th><th className="tr" style={{width:65}}>수량</th><th className="tr" style={{width:110}}>단가(원)</th><th className="tr" style={{width:110}}>노무비(원)</th><th className="tr" style={{width:115}}>합계(원)</th><th className="no-print" style={{width:34}}></th></tr></thead>
                    <tbody>
                        {ci.length===0&&<tr><td colSpan={8} style={{textAlign:'center',padding:16,color:'#94a3b8',fontSize:12}}>품목이 없습니다.</td></tr>}
                        {ci.map(item=><tr key={item.id}><td className="tc"><label className="img-lbl">{item.imgUrl?<img src={item.imgUrl} className="img-prev" alt=""/>:<div className="img-ph">+</div>}<input type="file" style={{display:'none'}} accept="image/*" onChange={e=>handleImg(e,item.id)}/></label></td><td><input className="cell-input" value={item.name} onChange={e=>updItem(item.id,'name',e.target.value)}/></td><td><input className="cell-input m" value={item.spec} onChange={e=>updItem(item.id,'spec',e.target.value)} placeholder="규격"/></td><td><input type="number" className="cell-input r" value={item.qty} onChange={e=>updItem(item.id,'qty',e.target.value)} min="0"/></td><td><input type="number" className="cell-input r" value={item.unitPrice} onChange={e=>updItem(item.id,'unitPrice',e.target.value)} min="0"/></td><td><input type="number" className="cell-input r" value={item.laborCost} onChange={e=>updItem(item.id,'laborCost',e.target.value)} min="0"/></td><td className="tr" style={{fontWeight:700,color:'var(--navy)'}}>{fmt(item.total)}</td><td className="tc no-print"><button className="del-btn" onClick={()=>delItem(item.id)}>✕</button></td></tr>)}
                        {ci.length>0&&<tr className="subtotal-row"><td colSpan={5}/><td className="tr subtotal-lbl">소 계</td><td className="tr subtotal-val">{fmt(sub)}원</td><td/></tr>}
                    </tbody>
                </table></div>
            </div>
        );})}

        {grand>0&&<div className="grand-card">
            <div><div className="grand-label">최종 견적금액 (VAT 포함)</div><div className="grand-val">{fmt(grandVat)}원</div><div className="grand-vat">공급가액 {fmt(grand)}원 + VAT {fmt(vat)}원</div></div>
            <div className="grand-breakdown">{[['자재비',totalMat,false],['노무비',totalLab,false],['공급가액',grand,false],['VAT 10%',vat,true]].map(([l,v,g])=><div className="bd-item" key={l}><div className="bd-label">{l}</div><div className="bd-val" style={g?{color:'var(--gold)'}:{}}>{fmt(v)}원</div></div>)}</div>
        </div>}
  
        {/* ★ 결제 정보 */}
        <div className="card" style={{marginTop:16}}>
            <div className="card-title">💳 결제 정보</div>
            <div className="pay-status-row">
                {['입금전','계약','완료'].map(s=>(
                    <button key={s} className={'pay-status-btn '+(paymentStatus===s?'ps-'+s:'')} onClick={()=>setPaymentStatus(s)}>
                        {s==='입금전'?'⏳ 입금전':s==='계약'?'📝 계약':'✅ 완료'}
                    </button>
                ))}
            </div>
            <div className="pay-grid">
                <div className="pay-field">
                    <div className="pay-label">계약금</div>
                    <input type="number" className="pay-input" value={depositAmount} min="0"
                        onChange={e=>setDepositAmount(e.target.value)} placeholder="금액 입력"/>
                    <div className="pay-sub">{fmt(depositNum)}원</div>
                </div>
                <div className="pay-field">
                    <div className="pay-label">중도금</div>
                    <input type="number" className="pay-input" value={midAmount} min="0"
                        onChange={e=>setMidAmount(e.target.value)} placeholder="금액 입력"/>
                    <div className="pay-sub">{fmt(midNum)}원</div>
                </div>
                <div className="pay-field">
                    <div className="pay-label">잔금 (자동계산)</div>
                    <input readOnly className={'pay-input auto '+(balancePaid||balanceAmount<=0&&grandVat>0?'zero':'')}
                        value={balancePaid?'0원':(grandVat>0?fmt(Math.max(0,balanceAmount))+'원':'-')}/>
                    <div className="pay-check-row">
                        <input type="checkbox" id="bpaid" className="pay-check"
                            checked={balancePaid} onChange={e=>setBalancePaid(e.target.checked)}/>
                        <label htmlFor="bpaid" className={'pay-check-lbl'+(balancePaid?' on':'')} style={{cursor:'pointer'}}>
                            잔금 입금 완료
                        </label>
                    </div>
                </div>
            </div>
        </div>

        {/* ★ 현장사진 */}
        <div className="card">
            <div className="card-title">📸 현장사진</div>
            <div className="site-photos-grid">
                {sitePhotos.map((photo,i)=>(
                    <div key={i} className="site-photo-item">
                        <img src={photo} className="site-photo-img" alt={'현장 '+(i+1)}/>
                        <button className="site-photo-del no-print"
                            onClick={()=>setSitePhotos(p=>p.filter((_,j)=>j!==i))}>✕</button>
                    </div>
                ))}
                <label className="site-photo-item site-photo-add no-print">
                    <span className="site-photo-add-icon">📷</span>
                    <span>사진 추가</span>
                    <input type="file" accept="image/*" multiple style={{display:'none'}}
                        onChange={async e=>{
                            const files=Array.from(e.target.files);e.target.value='';
                            for(const f of files){
                                const url=await uploadImg(sb,f,'site-photos');
                                setSitePhotos(p=>[...p,url]);
                            }
                        }}/>
                </label>
            </div>
            {sitePhotos.length===0&&<p style={{fontSize:12,color:'var(--muted)',marginTop:8}}>현장 사진을 추가하면 견적서에 함께 저장됩니다.</p>}
        </div>

        {/* ★ 소요 자재 */}
        <SoyoJaeCard estMaterials={estMaterials} setEstMaterials={setEstMaterials} uid={uid}/>


        {/* ★ 포트폴리오 첨부 */}
        <div className="card">
            <div className="card-title">🖼 포트폴리오 첨부</div>
            <div style={{marginBottom:10,display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                <button className="btn btn-outline btn-sm" onClick={()=>setShowPortPick(true)}>＋ 포트폴리오 선택</button>
                <span style={{fontSize:11,color:'var(--muted)'}}>※ 인쇄 시 이미지와 링크가 포함됩니다</span>
            </div>
            {portItems.length===0
                ?<p style={{fontSize:12,color:'var(--muted)'}}>첨부된 포트폴리오가 없습니다.</p>
                :<div className="est-port-grid">
                    {portItems.map((p,i)=>(
                        <div key={i} className="est-port-item">
                            {p.image_url?<img src={p.image_url} className="est-port-img" alt=""/>
                                :<div className="est-port-img" style={{display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,color:'#94a3b8'}}>🖼</div>}
                            <div className="est-port-info">
                                {p.title}
                                <div style={{display:'flex',gap:4,marginTop:4,flexWrap:'wrap'}}>
                                    {p.image_url&&<a href={p.image_url} target="_blank" rel="noreferrer"><button className="btn btn-outline btn-xs" style={{fontSize:10}}>🔗 열기</button></a>}
                                    {p.image_url&&<button className="btn btn-outline btn-xs" style={{fontSize:10}} onClick={()=>{navigator.clipboard?.writeText(p.image_url).then(()=>toast('📋 복사됨')).catch(()=>alert(p.image_url));}}>📋 복사</button>}
                                </div>
                            </div>
                            <button className="est-port-del no-print" onClick={()=>setPortItems(prev=>prev.filter((_,j)=>j!==i))}>✕</button>
                        </div>
                    ))}
                </div>}
        </div>

        {/* 포트폴리오 선택 팝업 */}
        {showPortPick&&<PortPickModal sb={sb} portItems={portItems} setPortItems={setPortItems} onClose={()=>setShowPortPick(false)}/>}

        <div style={{textAlign:'center',marginTop:18,fontSize:11,color:'#94a3b8',paddingBottom:40}}>★ 럭키스타 캠핑카라반 | 경기도 파주시 광탄면 | {new Date().toLocaleDateString('ko-KR')} 기준</div>
    </div>);
}
/* ═══════════════════════════════════════
   ★ 포트폴리오 선택 모달 (견적서용)
═══════════════════════════════════════ */
function PortPickModal({sb, portItems, setPortItems, onClose}){
    const[all,setAll]=useState([]);
    const[loading,setLoading]=useState(true);
    const[sel,setSel]=useState(portItems.map(p=>p.id));

    useEffect(()=>{
        if(!sb)return;
        sb.from('portfolios').select('*').order('created_at',{ascending:false})
          .then(({data})=>{if(data)setAll(data);setLoading(false);});
    },[sb]);

    const toggle=item=>setSel(p=>p.includes(item.id)?p.filter(id=>id!==item.id):[...p,item.id]);

    const confirm=()=>{
        setPortItems(all.filter(a=>sel.includes(a.id)).map(a=>({id:a.id,title:a.title,image_url:a.image_url})));
        onClose();
    };

    return(
        <div className="modal-overlay" onClick={onClose}>
            <div className="modal-box lg" onClick={e=>e.stopPropagation()}>
                <div className="modal-header">
                    <div className="modal-title">🖼 포트폴리오 선택</div>
                    <button className="modal-close" onClick={onClose}>✕</button>
                </div>
                {loading?<div style={{textAlign:'center',padding:40}}>로딩 중...</div>
                :all.length===0?<div style={{textAlign:'center',padding:40,color:'var(--muted)'}}>등록된 포트폴리오가 없습니다.<br/>먼저 포트폴리오 메뉴에서 추가하세요.</div>
                :<div className="port-pick-grid" style={{maxHeight:'60vh',overflowY:'auto',padding:'4px 2px'}}>
                    {all.map(item=>(
                        <div key={item.id} className={`port-pick-card ${sel.includes(item.id)?'selected':''}`} onClick={()=>toggle(item)}>
                            {item.image_url?<img src={item.image_url} alt=""/>:<div className="port-pick-card-ph">🖼</div>}
                            <div className="port-pick-info">
                                {sel.includes(item.id)&&<span style={{color:'var(--green)',marginRight:4}}>✅</span>}
                                {item.title}
                            </div>
                        </div>
                    ))}
                </div>}
                <div className="modal-btns">
                    <button className="modal-cancel" onClick={onClose}>취소</button>
                    <button className="modal-ok" onClick={confirm}>{sel.length}개 선택 완료</button>
                </div>
            </div>
        </div>
    );
}

function PortfolioModal({sb, prodCats, initial, onClose, onSave}){
    const blank={title:'',description:'',image_url:'',categories:'[]'};
    const[form,setForm]=useState(()=>{
        if(!initial)return{...blank,_cats:[]};
        let cats=[];try{cats=typeof initial.categories==='string'?JSON.parse(initial.categories||'[]'):(initial.categories||[]);}catch{}
        return{...initial,_cats:cats};
    });
    const[uploading,setUploading]=useState(false);
    const set=(k,v)=>setForm(p=>({...p,[k]:v}));
    const toggleCat=id=>setForm(p=>({...p,_cats:p._cats.includes(id)?p._cats.filter(c=>c!==id):[...p._cats,id]}));
    const pickImg=async e=>{
        const f=e.target.files[0];if(!f)return;
        setUploading(true);
        try{const url=await uploadImg(sb,f,'portfolio');set('image_url',url);}
        finally{setUploading(false);}
    };
    const ok=()=>{
        if(!form.title.trim()){alert('제목을 입력하세요');return;}
        const{_cats,...rest}=form;
        onSave({...rest,categories:JSON.stringify(_cats)});
    };
    return(
        <div className="modal-overlay" onClick={onClose}>
            <div className="modal-box" onClick={e=>e.stopPropagation()}>
                <div className="modal-header">
                    <div className="modal-title">{initial?'포트폴리오 수정':'포트폴리오 추가'}</div>
                    <button className="modal-close" onClick={onClose}>✕</button>
                </div>
                <div className="mf">
                    <label className="ml">이미지 *</label>
                    <label className="img-area" style={{display:'block',cursor:'pointer'}}>
                        {uploading?<div className="img-placeholder"><span>⏳</span>업로드 중...</div>
                        :form.image_url?<img src={form.image_url} alt="" style={{maxHeight:160,maxWidth:'100%',borderRadius:8,objectFit:'cover'}}/>
                        :<div className="img-placeholder"><span>📷</span>이미지 업로드</div>}
                        <input type="file" accept="image/*" style={{display:'none'}} onChange={pickImg}/>
                    </label>
                </div>
                <div className="mf"><label className="ml">제목 *</label><input className="mi" value={form.title} onChange={e=>set('title',e.target.value)} placeholder="작업명 입력"/></div>
                <div className="mf"><label className="ml">설명</label><input className="mi" value={form.description||''} onChange={e=>set('description',e.target.value)} placeholder="작업 설명 (선택)"/></div>
                <div className="mf">
                    <label className="ml">상품 분류 (해당 항목 체크)</label>
                    <div className="cat-check-grid">
                        {prodCats.map(c=>(
                            <label key={c.id} className={`cat-check-item ${form._cats.includes(c.id)?'checked':''}`} onClick={()=>toggleCat(c.id)}>
                                {form._cats.includes(c.id)?'✅':'⬜'} {c.name}
                            </label>
                        ))}
                        {prodCats.length===0&&<span style={{fontSize:12,color:'var(--muted)'}}>상품분류를 먼저 등록해 주세요.</span>}
                    </div>
                </div>
                <div className="modal-btns"><button className="modal-cancel" onClick={onClose}>취소</button><button className="modal-ok" onClick={ok}>저장</button></div>
            </div>
        </div>
    );
}

function Portfolio({sb, prodCats}){
    const[items,setItems]=useState([]);const[loading,setLoading]=useState(true);
    const[showModal,setShowModal]=useState(false);const[editing,setEditing]=useState(null);
    const[filterCat,setFilterCat]=useState(null);

    useEffect(()=>{
        if(!sb)return;
        sb.from('portfolios').select('*').order('created_at',{ascending:false})
          .then(({data})=>{if(data)setItems(data);setLoading(false);});
    },[sb]);

    const getCats=item=>{try{return typeof item.categories==='string'?JSON.parse(item.categories||'[]'):(item.categories||[]);}catch{return[];}};
    const catName=id=>prodCats.find(c=>c.id===id)?.name||'';

    const save=async form=>{
        setShowModal(false);setEditing(null);
        if(editing){
            const{data}=await sb.from('portfolios').update(form).eq('id',editing.id).select();
            if(data)setItems(p=>p.map(x=>x.id===editing.id?data[0]:x));
            toast('✅ 수정됨');
        }else{
            const{data}=await sb.from('portfolios').insert([form]).select();
            if(data)setItems(p=>[data[0],...p]);
            toast('✅ 추가됨');
        }
    };
    const del=async id=>{
        if(!confirm('삭제하시겠습니까?'))return;
        await sb.from('portfolios').delete().eq('id',id);
        setItems(p=>p.filter(x=>x.id!==id));
        toast('🗑 삭제됨');
    };

    const filtered=filterCat?items.filter(x=>getCats(x).includes(filterCat)):items;
    if(loading)return<div className="loading-wrap"><div className="loading-spinner"/></div>;

    return(<div>
        {showModal&&<PortfolioModal sb={sb} prodCats={prodCats} initial={editing} onClose={()=>{setShowModal(false);setEditing(null);}} onSave={save}/>}

            <div className="btn-row"><button className="btn btn-primary" onClick={()=>{setEditing(null);setShowModal(true);}}>＋ 포트폴리오 추가</button></div>
        </div>
        <div className="cat-filter">
            <div className={`cat-tab ${!filterCat?'active':''}`} onClick={()=>setFilterCat(null)}>전체 <span className="cnt">{items.length}</span></div>
            {prodCats.map(c=><div key={c.id} className={`cat-tab ${filterCat===c.id?'active':''}`} onClick={()=>setFilterCat(c.id)}>{c.name} <span className="cnt">{items.filter(x=>getCats(x).includes(c.id)).length}</span></div>)}
        </div>
        {filtered.length===0
            ?<div className="empty-state"><div className="empty-icon">🖼</div><div className="empty-text">포트폴리오가 없습니다.<br/>+ 포트폴리오 추가 버튼으로 시작하세요.</div></div>
            :<div className="port-grid">
                {filtered.map(item=>{
                    const cats=getCats(item);
                    return(<div key={item.id} className="port-card">
                        {item.image_url?<img src={item.image_url} className="port-card-img" alt=""/>:<div className="port-card-img-ph">🖼</div>}
                        <div className="port-card-body">
                            <div className="port-card-title">{item.title}</div>
                            <div className="port-card-cats">{cats.map(id=><span key={id} className="port-cat-tag">{catName(id)}</span>)}</div>
                            {item.description&&<div className="port-card-desc">{item.description}</div>}
                            <div className="port-card-actions">
                                {item.image_url&&<button className="btn btn-outline btn-sm" onClick={()=>{navigator.clipboard?.writeText(item.image_url).then(()=>toast('📋 링크 복사됨')).catch(()=>alert(item.image_url));}}>📋 링크복사</button>}
                                <button className="btn btn-outline btn-sm" onClick={()=>{setEditing(item);setShowModal(true);}}>✏️</button>
                                <button className="btn btn-sm" style={{background:'#fee2e2',color:'var(--red)',border:'none'}} onClick={()=>del(item.id)}>🗑</button>
                            </div>
                        </div>
                    </div>);
                })}
            </div>}
    </div>);
}
